<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Water Utility - Direct Bill Entry</title>
    <style>
        /* ... KEEP ALL YOUR EXISTING STYLES EXACTLY THE SAME ... */
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
            --light: #f8f9fa;
            --dark: #343a40;
            --gray: #6c757d;
        }
        /* ... (keep all your existing styles) ... */
    </style>
</head>
<body>
<!-- ... KEEP ALL YOUR EXISTING HTML STRUCTURE ... -->

<script>
    let allSchools = [];
    let allDepartments = [];
    let existingBills = [];
    let currentMonth = new Date().getMonth() + 1;
    let currentYear = new Date().getFullYear();
    let isLoading = false;
    let savingEntities = new Set();
    let activeSavingToast = null;
    
    let savedScrollPosition = 0;

    function saveScrollPosition() {
        const wrapper = document.querySelector('.table-wrapper');
        if (wrapper) {
            savedScrollPosition = wrapper.scrollTop;
        }
    }

    function restoreScrollPosition() {
        const wrapper = document.querySelector('.table-wrapper');
        if (wrapper && savedScrollPosition > 0) {
            setTimeout(() => {
                wrapper.scrollTop = savedScrollPosition;
            }, 50);
        }
    }

    function showLoading(show) {
        document.getElementById('loadingOverlay').classList.toggle('active', show);
    }

    function showSavingToast(entityName) {
        if (activeSavingToast) {
            activeSavingToast.remove();
        }
        const toast = document.createElement('div');
        toast.className = 'saving-toast';
        toast.innerHTML = '<span class="saving-spinner"></span> Saving ' + entityName + '... Please wait';
        document.body.appendChild(toast);
        activeSavingToast = toast;
        return toast;
    }

    function hideSavingToast() {
        if (activeSavingToast) {
            activeSavingToast.remove();
            activeSavingToast = null;
        }
    }

    function showToast(message, isError) {
        if (isError === undefined) isError = false;
        const toast = document.createElement('div');
        toast.className = isError ? 'error-toast' : 'success-toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(function() { toast.remove(); }, 4000);
    }

    function populateYears() {
        const yearSelect = document.getElementById('globalYear');
        yearSelect.innerHTML = '';
        const start = 2020;
        const end = 2035;
        for (let y = start; y <= end; y++) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            if (y === currentYear) opt.selected = true;
            yearSelect.appendChild(opt);
        }
    }

    async function loadAllEntities() {
        try {
            const [schoolsRes, deptsRes] = await Promise.all([
                fetch('/api/schools'),
                fetch('/api/departments')
            ]);
            if (schoolsRes.ok) {
                allSchools = await schoolsRes.json();
                console.log('Schools loaded in order:', allSchools.map(s => ({id: s.id, name: s.name, cluster: s.cluster_number})));
            }
            if (deptsRes.ok) {
                allDepartments = await deptsRes.json();
                console.log('Departments loaded in order:', allDepartments.map(d => ({id: d.id, name: d.unit_name, dept: d.department_name, order: d.display_order})));
            }
        } catch(e) {
            console.error('Error loading entities:', e);
        }
    }

    async function loadExistingBills(month, year) {
        try {
            const url = '/api/utility-bills?utility_type=water&month=' + month + '&year=' + year;
            const resp = await fetch(url);
            if (resp.ok) {
                existingBills = await resp.json();
            } else {
                existingBills = [];
            }
            console.log('Loaded ' + existingBills.length + ' existing water bills for ' + month + '/' + year);
        } catch(e) {
            console.error(e);
            existingBills = [];
        }
    }

    function extractWaterAccounts(entity) {
        let accounts = [];
        try {
            if (entity.water_accounts && typeof entity.water_accounts === 'string') {
                const parsed = JSON.parse(entity.water_accounts);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    accounts = parsed;
                }
            } else if (entity.water_accounts && Array.isArray(entity.water_accounts)) {
                accounts = entity.water_accounts;
            } else if (entity.water_account && entity.water_account !== '—') {
                const meters = [];
                if (entity.water_meter && entity.water_meter !== '—') {
                    meters.push({ meterNumber: entity.water_meter, location: '', notes: '' });
                } else {
                    meters.push({ meterNumber: '—', location: '', notes: '' });
                }
                accounts = [{ accountNumber: entity.water_account, meters: meters }];
            }
        } catch(e) {
            console.error('Error parsing water accounts:', e);
        }
        return accounts;
    }

    // IMPORTANT: Build entity list preserving EXACT order from API
    function buildEntityList() {
        const entities = [];
        
        // Process schools in the EXACT order from API (already sorted by cluster_number then id)
        for (let idx = 0; idx < allSchools.length; idx++) {
            const school = allSchools[idx];
            const accounts = extractWaterAccounts(school);
            
            let accountGroups = accounts;
            let hasAccounts = accounts.length > 0;
            
            // Always create placeholder if no accounts
            if (!hasAccounts) {
                accountGroups = [{
                    accountNumber: '—',
                    meters: [{ meterNumber: '—', location: '', notes: '' }],
                    isPlaceholder: true
                }];
            }
            
            entities.push({
                id: school.id,
                name: school.name,
                type: 'school',
                typeLabel: '🏫 School',
                clusterNumber: school.cluster_number ? 'CLUSTER ' + school.cluster_number : 'Unassigned',
                departmentName: null,
                originalOrder: idx,
                accountGroups: accountGroups,
                hasAccounts: hasAccounts
            });
        }
        
        // Process departments in the EXACT order from API (already sorted by display_order, department_name, id)
        for (let idx = 0; idx < allDepartments.length; idx++) {
            const dept = allDepartments[idx];
            const accounts = extractWaterAccounts(dept);
            
            let accountGroups = accounts;
            let hasAccounts = accounts.length > 0;
            
            if (!hasAccounts) {
                accountGroups = [{
                    accountNumber: '—',
                    meters: [{ meterNumber: '—', location: '', notes: '' }],
                    isPlaceholder: true
                }];
            }
            
            const displayName = dept.unit_name || dept.department_name || dept.name || 'Dept #' + dept.id;
            entities.push({
                id: dept.id,
                name: displayName,
                type: 'department',
                typeLabel: '🏛️ Department',
                clusterNumber: null,
                departmentName: dept.department_name || 'Other',
                originalOrder: allSchools.length + idx,
                accountGroups: accountGroups,
                hasAccounts: hasAccounts
            });
        }
        
        return entities;
    }

    function findExistingBill(entityType, entityId, accountNumber, meterNumber, month, year) {
        for (let i = 0; i < existingBills.length; i++) {
            const bill = existingBills[i];
            if (bill.entity_type === entityType &&
                bill.entity_id == entityId &&
                (bill.account_number || '—') === (accountNumber || '—') &&
                (bill.meter_number || '—') === (meterNumber || '—') &&
                bill.month == month && 
                bill.year == year) {
                return bill;
            }
        }
        return null;
    }

    function matchesSearch(entity, searchTerm) {
        if (!searchTerm) return true;
        const term = searchTerm.toLowerCase();
        if (entity.name.toLowerCase().includes(term)) return true;
        for (let a = 0; a < entity.accountGroups.length; a++) {
            const account = entity.accountGroups[a];
            if (account.accountNumber && account.accountNumber !== '—' && account.accountNumber.toLowerCase().includes(term)) return true;
            if (account.meters) {
                for (let m = 0; m < account.meters.length; m++) {
                    const meter = account.meters[m];
                    if (meter.meterNumber && meter.meterNumber !== '—' && meter.meterNumber.toLowerCase().includes(term)) return true;
                }
            }
        }
        return false;
    }

    async function saveEntityDataBackground(entityRow, month, year) {
        const startTime = performance.now();
        console.log('START BACKGROUND SAVE');
        
        if (isLoading) return;
        
        const entityId = parseInt(entityRow.getAttribute('data-entity-id'));
        const entityType = entityRow.getAttribute('data-entity-type');
        const entityName = entityRow.getAttribute('data-entity-name');
        const hasAccounts = entityRow.getAttribute('data-has-accounts') === 'true';
        
        if (!hasAccounts) {
            showToast('Cannot save: No water account configured for this entity.', true);
            return;
        }
        
        if (savingEntities.has(entityId)) {
            showToast('Already saving...', true);
            return;
        }
        
        showSavingToast(entityName);
        
        let meterRows = [];
        let nextRow = entityRow.nextElementSibling;
        while (nextRow && nextRow.classList && nextRow.classList.contains('meter-row')) {
            meterRows.push(nextRow);
            nextRow = nextRow.nextElementSibling;
        }
        
        if (meterRows.length === 0) {
            showToast('No data to save', true);
            hideSavingToast();
            return;
        }
        
        const saveBtn = entityRow.querySelector('.save-entity-btn');
        const originalBtnText = saveBtn ? saveBtn.innerHTML : 'Save All';
        if (saveBtn) {
            saveBtn.innerHTML = '<span class="saving-indicator"></span> Saving...';
            saveBtn.disabled = true;
        }
        
        const batchBills = [];
        for (let i = 0; i < meterRows.length; i++) {
            const row = meterRows[i];
            const accountNumber = row.getAttribute('data-account');
            const meterNumber = row.getAttribute('data-meter');
            const existingBillId = row.getAttribute('data-bill-id') ? parseInt(row.getAttribute('data-bill-id')) : null;
            
            const consumptionInput = row.querySelector('.consumption-input');
            const currentInput = row.querySelector('.current-charge-input');
            const outstandingInput = row.querySelector('.outstanding-input');
            const previousPaidInput = row.querySelector('.previous-paid-input');
            const amountPaidInput = row.querySelector('.amount-paid-input');
            const notesInput = row.querySelector('.notes-input');
            
            const consumption = parseFloat(consumptionInput ? consumptionInput.value : 0) || 0;
            const currentCharges = parseFloat(currentInput ? currentInput.value : 0) || 0;
            const unsettledCharges = parseFloat(outstandingInput ? outstandingInput.value : 0) || 0;
            const previousPayment = parseFloat(previousPaidInput ? previousPaidInput.value : 0) || 0;
            const amountPaid = parseFloat(amountPaidInput ? amountPaidInput.value : 0) || 0;
            const notes = notesInput ? notesInput.value : '';
            
            batchBills.push({
                id: existingBillId,
                account_number: accountNumber === '—' ? '' : accountNumber,
                meter_number: meterNumber === '—' ? '' : meterNumber,
                consumption_m3: consumption,
                current_charges: currentCharges,
                unsettled_charges: unsettledCharges,
                amount_paid: amountPaid,
                notes: JSON.stringify({ previousPayment: previousPayment, originalNotes: notes }),
                month: month,
                year: year,
                entity_type: entityType,
                entity_id: entityId,
                utility_type: 'water'
            });
        }
        
        savingEntities.add(entityId);
        
        try {
            const resp = await fetch('/api/utility-bills/batch-update', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ bills: batchBills })
            });
            
            const result = await resp.json();
            const endTime = performance.now();
            const totalTime = (endTime - startTime).toFixed(0);
            
            hideSavingToast();
            
            if (result.success) {
                showToast(entityName + ': Saved ' + result.success_count + ' record(s) successfully (' + totalTime + 'ms)', false);
                updateEntityTotalDisplay(entityId, batchBills);
            } else {
                showToast(entityName + ': Saved ' + result.success_count + ' records, ' + result.error_count + ' failed', true);
            }
        } catch (err) {
            console.error('Save error:', err);
            hideSavingToast();
            showToast('Network error. Please try again.', true);
        } finally {
            savingEntities.delete(entityId);
            if (saveBtn) {
                saveBtn.innerHTML = originalBtnText;
                saveBtn.disabled = false;
            }
            isLoading = false;
        }
    }
    
    function updateEntityTotalDisplay(entityId, batchBills) {
        let totalPaid = 0;
        for (let i = 0; i < batchBills.length; i++) {
            totalPaid += batchBills[i].amount_paid || 0;
        }
        
        const entityTotalSpan = document.getElementById('entity-total-' + entityId);
        if (entityTotalSpan) {
            entityTotalSpan.innerHTML = '(Total Paid: $' + totalPaid.toFixed(2) + ')';
        }
        
        const entityStatusSpan = document.getElementById('entity-status-' + entityId);
        if (entityStatusSpan) {
            if (totalPaid > 0) {
                entityStatusSpan.innerHTML = 'Paid';
                entityStatusSpan.className = 'status-badge status-paid';
            } else {
                entityStatusSpan.innerHTML = 'Pending';
                entityStatusSpan.className = 'status-badge status-pending';
            }
        }
    }

    async function renderWaterTable() {
        const month = parseInt(document.getElementById('globalMonth').value);
        const year = parseInt(document.getElementById('globalYear').value);
        currentMonth = month;
        currentYear = year;
        
        const tbody = document.getElementById('billsTableBody');
        tbody.innerHTML = '<tr><td colspan="12" class="no-data">Loading data...<\/td><tr>';
        
        await loadAllEntities();
        await loadExistingBills(month, year);
        
        let allEntities = buildEntityList();
        
        const entityFilter = document.getElementById('entityTypeFilter').value;
        const searchTerm = document.getElementById('searchFilter').value;
        const statusFilter = document.getElementById('statusFilter').value;
        
        // Apply basic filters (entity type and search term only)
        let filteredEntities = [];
        for (let i = 0; i < allEntities.length; i++) {
            const entity = allEntities[i];
            if (entityFilter !== 'all' && entity.type !== entityFilter) continue;
            if (searchTerm && !matchesSearch(entity, searchTerm)) continue;
            filteredEntities.push(entity);
        }
        
        if (filteredEntities.length === 0) {
            tbody.innerHTML = '<tr class="no-data-row"><td colspan="12" class="no-data">No matching entities found.<\/td><\/tr>';
            restoreScrollPosition();
            isLoading = false;
            return;
        }
        
        tbody.innerHTML = '';
        let globalSerial = 1;
        
        // Track current cluster for separator
        let currentCluster = '';
        
        // Render ALL schools in EXACT order from filteredEntities (which preserves API order)
        // Schools and departments are already interleaved in the correct order from the API
        for (let i = 0; i < filteredEntities.length; i++) {
            const entity = filteredEntities[i];
            
            // Add cluster separator for schools when cluster changes
            if (entity.type === 'school') {
                if (entity.clusterNumber !== currentCluster) {
                    currentCluster = entity.clusterNumber;
                    
                    // Count schools and meters in this cluster for the separator
                    let schoolsInCluster = 0;
                    let totalMeters = 0;
                    for (let j = i; j < filteredEntities.length; j++) {
                        if (filteredEntities[j].type === 'school' && filteredEntities[j].clusterNumber === currentCluster) {
                            schoolsInCluster++;
                            for (let a = 0; a < filteredEntities[j].accountGroups.length; a++) {
                                totalMeters += filteredEntities[j].accountGroups[a].meters.length;
                            }
                        } else if (filteredEntities[j].type !== 'school') {
                            break;
                        } else if (filteredEntities[j].clusterNumber !== currentCluster) {
                            break;
                        }
                    }
                    
                    const separatorRow = document.createElement('tr');
                    separatorRow.className = 'cluster-separator';
                    separatorRow.innerHTML = '<td colspan="12"><div class="cluster-info"><span>🏫 ' + currentCluster + '</span><span class="cluster-count">' + schoolsInCluster + ' entit' + (schoolsInCluster > 1 ? 'ies' : 'y') + ', ' + totalMeters + ' meter' + (totalMeters > 1 ? 's' : '') + '</span></div></td>';
                    tbody.appendChild(separatorRow);
                }
            }
            
            // Check status filter at entity level
            let entityHasPaidBills = false;
            for (let a = 0; a < entity.accountGroups.length; a++) {
                const account = entity.accountGroups[a];
                for (let m = 0; m < account.meters.length; m++) {
                    const meter = account.meters[m];
                    const existing = findExistingBill(entity.type, entity.id, account.accountNumber, meter.meterNumber, month, year);
                    if (existing && (existing.amount_paid || 0) > 0) {
                        entityHasPaidBills = true;
                        break;
                    }
                }
                if (entityHasPaidBills) break;
            }
            
            if (statusFilter === 'paid' && !entityHasPaidBills) continue;
            if (statusFilter === 'pending' && entityHasPaidBills) continue;
            
            // Render the entity
            globalSerial = await renderEntity(tbody, entity, month, year, globalSerial);
        }
        
        restoreScrollPosition();
        isLoading = false;
        showLoading(false);
    }
    
    async function renderEntity(tbody, entity, month, year, startSerial) {
        let serial = startSerial;
        let entityTotalPaid = 0;
        let entityHasBills = false;
        let isPlaceholder = !entity.hasAccounts;
        let isFirstMeter = true;
        
        let meterRowsData = [];
        
        for (let a = 0; a < entity.accountGroups.length; a++) {
            const account = entity.accountGroups[a];
            let isFirstMeterForAccount = true;
            if (account.isPlaceholder) isPlaceholder = true;
            
            for (let m = 0; m < account.meters.length; m++) {
                const meter = account.meters[m];
                const existing = meter.existing;
                let parsedNotes = {};
                if (existing && existing.notes && existing.notes.startsWith('{')) {
                    try { parsedNotes = JSON.parse(existing.notes); } catch(e) {}
                }
                
                let consumption = existing ? (existing.consumption_m3 || 0) : 0;
                let currentCharges = existing ? (existing.current_charges || 0) : 0;
                let outstandingCharges = existing ? (existing.unsettled_charges || 0) : 0;
                let previousPayment = parsedNotes.previousPayment || 0;
                let amountPaid = existing ? (existing.amount_paid || 0) : 0;
                let notes = parsedNotes.originalNotes || meter.notes || '';
                
                const isPlaceholderAccount = account.isPlaceholder || meter.isPlaceholder;
                const disabledAttr = isPlaceholderAccount ? 'disabled' : '';
                const placeholderClass = isPlaceholderAccount ? 'placeholder-text' : '';
                
                if (!isPlaceholderAccount) {
                    entityTotalPaid += amountPaid;
                    if (existing && amountPaid > 0) entityHasBills = true;
                }
                
                const locationDisplay = meter.location ? '<div style="font-size:0.7rem; color:#666;">📍 ' + escapeHtml(meter.location) + '</div>' : '';
                
                meterRowsData.push({
                    serial: serial,
                    accountNumber: account.accountNumber,
                    meterNumber: meter.meterNumber,
                    locationDisplay: locationDisplay,
                    consumption: consumption,
                    currentCharges: currentCharges,
                    outstandingCharges: outstandingCharges,
                    previousPayment: previousPayment,
                    amountPaid: amountPaid,
                    notes: notes,
                    billId: meter.billId,
                    isFirstMeterForAccount: isFirstMeterForAccount,
                    isPlaceholder: isPlaceholderAccount,
                    disabledAttr: disabledAttr,
                    placeholderClass: placeholderClass
                });
                
                isFirstMeterForAccount = false;
                serial++;
            }
        }
        
        let entityStatusClass = 'status-pending';
        let entityStatusText = 'Pending';
        if (isPlaceholder) {
            entityStatusText = 'No account';
            entityStatusClass = 'status-pending';
        } else if (entityHasBills) {
            entityStatusText = 'Paid';
            entityStatusClass = 'status-paid';
        } else if (entityTotalPaid === 0) {
            entityStatusText = 'Not entered';
        } else {
            entityStatusText = 'Partially Paid';
            entityStatusClass = 'status-partial';
        }
        
        const entityRow = document.createElement('tr');
        entityRow.className = 'entity-row';
        entityRow.setAttribute('data-entity-type', entity.type);
        entityRow.setAttribute('data-entity-id', entity.id);
        entityRow.setAttribute('data-entity-name', entity.name);
        entityRow.setAttribute('data-has-accounts', !isPlaceholder);
        
        entityRow.innerHTML = '<td class="seq-number">' + startSerial + '</div>' +
            '<td class="entity-header"><span class="entity-name">' + escapeHtml(entity.name) + '</span>' +
            (!isPlaceholder ? '<span class="total-due" id="entity-total-' + entity.id + '">(Total Paid: $' + entityTotalPaid.toFixed(2) + ')</span>' : '<span class="total-due placeholder-text">(No water account configured)</span>') +
            '</div>' +
            '<td><span class="badge ' + (entity.type === 'school' ? 'badge-school' : 'badge-department') + '">' + entity.typeLabel + '</span></div>' +
            '<td colspan="6"></div>' +
            '<td></div>' +
            '<td><span class="status-badge ' + entityStatusClass + '" id="entity-status-' + entity.id + '">' + entityStatusText + '</span></div>' +
            '<td class="entity-actions"><button class="btn btn-success btn-sm save-entity-btn">Save All</button></div>';
        tbody.appendChild(entityRow);
        
        for (let i = 0; i < meterRowsData.length; i++) {
            const meterData = meterRowsData[i];
            const meterRow = document.createElement('tr');
            meterRow.className = 'meter-row';
            meterRow.setAttribute('data-account', escapeHtml(meterData.accountNumber));
            meterRow.setAttribute('data-meter', escapeHtml(meterData.meterNumber));
            if (meterData.billId) meterRow.setAttribute('data-bill-id', meterData.billId);
            
            let amountPaidHtml = '';
            if (isFirstMeter) {
                amountPaidHtml = '<input type="number" step="0.01" class="inline-input amount-paid-input ' + meterData.placeholderClass + '" value="' + meterData.amountPaid.toFixed(2) + '" placeholder="$" ' + meterData.disabledAttr + '>';
                isFirstMeter = false;
            } else {
                amountPaidHtml = '<div class="amount-paid-disabled">—</div>';
            }
            
            let accountDisplayHtml = '';
            if (meterData.isFirstMeterForAccount) {
                if (meterData.accountNumber && meterData.accountNumber !== '—') {
                    accountDisplayHtml = '<div><span class="account-number">📋 ' + escapeHtml(meterData.accountNumber) + '</span></div>';
                } else {
                    accountDisplayHtml = '<div><span class="account-number placeholder-text">📋 No account number</span></div>';
                }
            }
            
            meterRow.innerHTML = '<td class="seq-number">' + (meterData.isFirstMeterForAccount ? meterData.serial : '') + '</div>' +
                '<td></div>' +
                '<td></div>' +
                '<td>' + accountDisplayHtml +
                    '<div class="meter-number">🔢 Meter: ' + escapeHtml(meterData.meterNumber) + '</div>' +
                    meterData.locationDisplay +
                '</div>' +
                '<td><input type="number" step="0.01" class="inline-input consumption-input ' + meterData.placeholderClass + '" value="' + meterData.consumption.toFixed(2) + '" placeholder="m³" ' + meterData.disabledAttr + '><span class="consumption-unit">m³</span></div>' +
                '<td><input type="number" step="0.01" class="inline-input current-charge-input ' + meterData.placeholderClass + '" value="' + meterData.currentCharges.toFixed(2) + '" placeholder="$" ' + meterData.disabledAttr + '></div>' +
                '<td><input type="number" step="0.01" class="inline-input outstanding-input ' + meterData.placeholderClass + '" value="' + meterData.outstandingCharges.toFixed(2) + '" placeholder="$" ' + meterData.disabledAttr + '></div>' +
                '<td><input type="number" step="0.01" class="inline-input previous-paid-input ' + meterData.placeholderClass + '" value="' + meterData.previousPayment.toFixed(2) + '" placeholder="$" ' + meterData.disabledAttr + '></div>' +
                '<td class="amount-paid-cell">' + amountPaidHtml + '</div>' +
                '<td class="notes-cell"><input type="text" class="inline-input notes-input ' + meterData.placeholderClass + '" value="' + escapeHtml(meterData.notes) + '" placeholder="Notes..." ' + meterData.disabledAttr + '></div>' +
                '<td></div>' +
                '<td></div>';
            tbody.appendChild(meterRow);
        }
        
        return serial;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function attachEventListeners() {
        document.getElementById('billsTableBody').addEventListener('click', async function(e) {
            const saveBtn = e.target.closest('.save-entity-btn');
            if (saveBtn && !saveBtn.disabled) {
                const entityRow = saveBtn.closest('tr.entity-row');
                if (entityRow) {
                    await saveEntityDataBackground(entityRow, currentMonth, currentYear);
                }
                return;
            }
        });
    }
    
    document.addEventListener('DOMContentLoaded', async function() {
        populateYears();
        
        const now = new Date();
        const monthSelect = document.getElementById('globalMonth');
        const yearSelect = document.getElementById('globalYear');
        
        if (monthSelect) monthSelect.value = now.getMonth() + 1;
        if (yearSelect) yearSelect.value = now.getFullYear();
        
        attachEventListeners();
        await renderWaterTable();
        
        const refreshBtn = document.getElementById('refreshTableBtn');
        if (refreshBtn) {
            refreshBtn.addEventListener('click', async function() {
                await renderWaterTable();
            });
        }
        
        const applyFiltersBtn = document.getElementById('applyFiltersBtn');
        if (applyFiltersBtn) {
            applyFiltersBtn.addEventListener('click', async function() {
                await renderWaterTable();
            });
        }
    });
</script>
</body>
</html>
