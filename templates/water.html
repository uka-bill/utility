        }

            display: flex;
            justify-content: space-between;
            align-items: center;
            height: 70px;
        }

            display: flex;
            align-items: center;
            font-weight: 700;
            font-size: 1.5rem;

        }
        
        .logo span {
            margin-left: 10px;
        }

            display: flex;
            list-style: none;
        }

            margin: 0 5px;
