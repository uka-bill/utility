<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Utility - Direct Bill Entry</title>
    <style>
        /* ... KEEP ALL YOUR EXISTING STYLES EXACTLY THE SAME ... */
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
            --light: #f8f9fa;
            --dark: #343a40;
            --gray: #6c757d;
        }
        /* ... (keep all existing styles from your working electricity.html) ... */
    </style>
</head>
<body>
<!-- ... KEEP ALL EXISTING HTML STRUCTURE EXACTLY THE SAME ... -->

<script>
    let allSchools = [];
    let allDepartments = [];
    let existingBills = [];
    let currentMonth = new Date().getMonth() + 1;
    let currentYear = new Date().getFullYear();
    let isLoading = false;
    let savingEntities = new Set();
    let activeSavingToast = null;
    let savedScrollPosition = 0;

    // ... keep all existing helper functions (saveScrollPosition, showToast, populateYears, loadAllEntities, loadExistingBills, matchesSearch, saveEntityDataBackground, updateEntityTotalDisplay) exactly the same as your working version ...

    // FIXED: Extract electricity accounts - MUST match water.html logic exactly
    function extractElectricityAccounts(entity) {
        let accounts = [];
        try {
            // First, try to get from electricity_accounts JSON string
            if (entity.electricity_accounts && typeof entity.electricity_accounts === 'string') {
                const parsed = JSON.parse(entity.electricity_accounts);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    accounts = parsed;
                    console.log(`Using JSON accounts for ${entity.name}:`, accounts);
                }
            } 
            // Then try if it's already an array
            else if (entity.electricity_accounts && Array.isArray(entity.electricity_accounts)) {
                accounts = entity.electricity_accounts;
                console.log(`Using array accounts for ${entity.name}:`, accounts);
            }
            
            // If still no accounts, check single account fields (legacy format)
            if (accounts.length === 0 && entity.electricity_account && entity.electricity_account !== '—') {
                const meters = [];
                if (entity.electricity_meter && entity.electricity_meter !== '—') {
                    meters.push({ meterNumber: entity.electricity_meter, location: '', notes: '' });
                } else {
                    meters.push({ meterNumber: '—', location: '', notes: '' });
                }
                accounts = [{ accountNumber: entity.electricity_account, meters: meters }];
                console.log(`Using single account for ${entity.name}: Account=${entity.electricity_account}, Meter=${entity.electricity_meter || '—'}`);
            }
        } catch(e) {
            console.error("Error parsing electricity accounts:", e);
        }
        
        // If absolutely no accounts, return empty array (will show placeholder later)
        return accounts;
    }

    // FIXED: Build entity list with proper account grouping
    function buildEntityList() {
        const entities = [];
        
        // Process schools in API order (already sorted by cluster then id)
        for (let idx = 0; idx < allSchools.length; idx++) {
            const school = allSchools[idx];
            const accounts = extractElectricityAccounts(school);
            
            let accountGroups = [];
            let hasAccounts = false;
            
            if (accounts.length > 0 && accounts[0].accountNumber && accounts[0].accountNumber !== '—') {
                accountGroups = accounts;
                hasAccounts = true;
            } else {
                // Create placeholder for schools without accounts
                accountGroups = [{
                    accountNumber: '—',
                    meters: [{ meterNumber: '—', location: '', notes: '' }],
                    isPlaceholder: true
                }];
                hasAccounts = false;
            }
            
            let cluster = school.cluster_number ? `CLUSTER ${school.cluster_number}` : 'Unassigned';
            
            entities.push({
                id: school.id,
                name: school.name || `School #${school.id}`,
                type: 'school',
                typeLabel: '🏫 School',
                clusterNumber: cluster,
                departmentName: null,
                accountGroups: accountGroups,
                hasAccounts: hasAccounts
            });
        }
        
        // Process departments in API order (already sorted by display_order, department_name, id)
        for (let idx = 0; idx < allDepartments.length; idx++) {
            const dept = allDepartments[idx];
            const accounts = extractElectricityAccounts(dept);
            
            let accountGroups = [];
            let hasAccounts = false;
            
            if (accounts.length > 0 && accounts[0].accountNumber && accounts[0].accountNumber !== '—') {
                accountGroups = accounts;
                hasAccounts = true;
            } else {
                accountGroups = [{
                    accountNumber: '—',
                    meters: [{ meterNumber: '—', location: '', notes: '' }],
                    isPlaceholder: true
                }];
                hasAccounts = false;
            }
            
            const displayName = dept.unit_name || dept.department_name || dept.name || `Dept #${dept.id}`;
            entities.push({
                id: dept.id,
                name: displayName,
                type: 'department',
                typeLabel: '🏛️ Department',
                clusterNumber: null,
                departmentName: dept.department_name || 'Other',
                accountGroups: accountGroups,
                hasAccounts: hasAccounts
            });
        }
        
        return entities;
    }

    // FIXED: Find existing bill - more robust
    function findExistingBill(entityType, entityId, accountNumber, meterNumber, month, year) {
        // Normalize values for comparison
        const normAccount = (accountNumber || '').trim();
        const normMeter = (meterNumber || '').trim();
        
        for (let i = 0; i < existingBills.length; i++) {
            const bill = existingBills[i];
            const billAccount = (bill.account_number || '').trim();
            const billMeter = (bill.meter_number || '').trim();
            
            if (bill.entity_type === entityType &&
                bill.entity_id == entityId &&
                billAccount === normAccount &&
                billMeter === normMeter &&
                bill.month == month && 
                bill.year == year) {
                return bill;
            }
        }
        return null;
    }

    // FIXED: renderElectricityTable - proper grouping and serial numbering
    async function renderElectricityTable() {
        const month = parseInt(document.getElementById('globalMonth').value);
        const year = parseInt(document.getElementById('globalYear').value);
        currentMonth = month;
        currentYear = year;
        
        const tbody = document.getElementById('billsTableBody');
        tbody.innerHTML = '<tr><td colspan="12" class="no-data">Loading data...<\/td></tr>';
        
        await loadAllEntities();
        await loadExistingBills(month, year);
        
        let allEntities = buildEntityList();
        
        const entityFilter = document.getElementById('entityTypeFilter').value;
        const searchTerm = document.getElementById('searchFilter').value;
        const statusFilter = document.getElementById('statusFilter').value;
        
        // Apply filters
        let filteredEntities = allEntities.filter(entity => {
            if (entityFilter !== 'all' && entity.type !== entityFilter) return false;
            if (searchTerm && !matchesSearch(entity, searchTerm)) return false;
            return true;
        });
        
        if (filteredEntities.length === 0) {
            tbody.innerHTML = '<tr class="no-data-row"><td colspan="12" class="no-data">No matching entities found.<\/td><\/tr>';
            restoreScrollPosition();
            isLoading = false;
            return;
        }
        
        tbody.innerHTML = '';
        let globalSerial = 1;
        
        // Separate schools and departments
        const schoolsList = filteredEntities.filter(e => e.type === 'school');
        const departmentsList = filteredEntities.filter(e => e.type === 'department');
        
        // Group schools by cluster
        const schoolsByCluster = new Map();
        for (const school of schoolsList) {
            const cluster = school.clusterNumber || 'Unassigned';
            if (!schoolsByCluster.has(cluster)) {
                schoolsByCluster.set(cluster, []);
            }
            schoolsByCluster.get(cluster).push(school);
        }
        
        const clusterOrder = ['CLUSTER 1', 'CLUSTER 2', 'CLUSTER 3', 'CLUSTER 4', 'CLUSTER 5', 'CLUSTER 6', 'Unassigned'];
        
        // Render schools by cluster
        for (const cluster of clusterOrder) {
            const clusterSchools = schoolsByCluster.get(cluster);
            if (!clusterSchools || clusterSchools.length === 0) continue;
            
            // Count total meters in this cluster
            let totalMeters = 0;
            for (const school of clusterSchools) {
                for (const account of school.accountGroups) {
                    totalMeters += account.meters.length;
                }
            }
            
            // Add cluster separator
            const separatorRow = document.createElement('tr');
            separatorRow.className = 'cluster-separator';
            separatorRow.innerHTML = `
                <td colspan="12">
                    <div class="cluster-info">
                        <span>🏫 ${cluster}</span>
                        <span class="cluster-count">${clusterSchools.length} entit${clusterSchools.length > 1 ? 'ies' : 'y'}, ${totalMeters} meter${totalMeters > 1 ? 's' : ''}</span>
                    </div>
                 </div>
            `;
            tbody.appendChild(separatorRow);
            
            // Render each school in cluster
            for (const entity of clusterSchools) {
                // Check status filter
                let entityHasPaidBills = false;
                for (const account of entity.accountGroups) {
                    for (const meter of account.meters) {
                        const existing = findExistingBill(entity.type, entity.id, account.accountNumber, meter.meterNumber, month, year);
                        if (existing && (existing.amount_paid || 0) > 0) {
                            entityHasPaidBills = true;
                            break;
                        }
                    }
                    if (entityHasPaidBills) break;
                }
                
                if (statusFilter === 'paid' && !entityHasPaidBills) continue;
                if (statusFilter === 'pending' && entityHasPaidBills) continue;
                
                globalSerial = await renderEntity(tbody, entity, month, year, globalSerial);
            }
        }
        
        // Group departments by department name
        const deptByDepartmentName = new Map();
        for (const dept of departmentsList) {
            const deptName = dept.departmentName || 'Other';
            if (!deptByDepartmentName.has(deptName)) {
                deptByDepartmentName.set(deptName, []);
            }
            deptByDepartmentName.get(deptName).push(dept);
        }
        
        // Get department names in order
        const deptNamesInOrder = [];
        for (const dept of departmentsList) {
            const deptName = dept.departmentName || 'Other';
            if (!deptNamesInOrder.includes(deptName)) {
                deptNamesInOrder.push(deptName);
            }
        }
        
        // Render departments by department name
        for (const deptName of deptNamesInOrder) {
            const deptsInGroup = deptByDepartmentName.get(deptName);
            if (!deptsInGroup || deptsInGroup.length === 0) continue;
            
            // Count total meters in this department group
            let totalMeters = 0;
            for (const dept of deptsInGroup) {
                for (const account of dept.accountGroups) {
                    totalMeters += account.meters.length;
                }
            }
            
            // Add department separator
            const deptSeparator = document.createElement('tr');
            deptSeparator.className = 'department-group-separator';
            deptSeparator.innerHTML = `
                <td colspan="12">
                    <div class="dept-group-info">
                        <span class="department-name-badge">🏢 ${escapeHtml(deptName)}</span>
                        <span class="dept-group-count">${deptsInGroup.length} unit${deptsInGroup.length > 1 ? 's' : ''}, ${totalMeters} meter${totalMeters > 1 ? 's' : ''}</span>
                    </div>
                 </div>
            `;
            tbody.appendChild(deptSeparator);
            
            // Render each department in group
            for (const entity of deptsInGroup) {
                // Check status filter
                let entityHasPaidBills = false;
                for (const account of entity.accountGroups) {
                    for (const meter of account.meters) {
                        const existing = findExistingBill(entity.type, entity.id, account.accountNumber, meter.meterNumber, month, year);
                        if (existing && (existing.amount_paid || 0) > 0) {
                            entityHasPaidBills = true;
                            break;
                        }
                    }
                    if (entityHasPaidBills) break;
                }
                
                if (statusFilter === 'paid' && !entityHasPaidBills) continue;
                if (statusFilter === 'pending' && entityHasPaidBills) continue;
                
                globalSerial = await renderEntity(tbody, entity, month, year, globalSerial);
            }
        }
        
        restoreScrollPosition();
        isLoading = false;
        showLoading(false);
    }
    
    // FIXED: renderEntity - properly displays account number and meter number
    async function renderEntity(tbody, entity, month, year, startSerial) {
        let serial = startSerial;
        let entityTotalPaid = 0;
        let entityHasBills = false;
        let isPlaceholder = !entity.hasAccounts;
        
        // First, collect all meter data and calculate totals
        let allMeters = [];
        
        for (const account of entity.accountGroups) {
            for (const meter of account.meters) {
                const existing = findExistingBill(entity.type, entity.id, account.accountNumber, meter.meterNumber, month, year);
                
                let parsedNotes = {};
                if (existing && existing.notes && existing.notes.startsWith('{')) {
                    try { parsedNotes = JSON.parse(existing.notes); } catch(e) {}
                }
                
                let consumption = existing ? (existing.consumption_kwh || 0) : 0;
                let currentCharges = existing ? (existing.current_charges || 0) : 0;
                let outstandingCharges = existing ? (existing.unsettled_charges || 0) : 0;
                let previousPayment = parsedNotes.previousPayment || 0;
                let amountPaid = existing ? (existing.amount_paid || 0) : 0;
                let notes = parsedNotes.originalNotes || meter.notes || '';
                
                if (!isPlaceholder) {
                    entityTotalPaid += amountPaid;
                    if (amountPaid > 0) entityHasBills = true;
                }
                
                allMeters.push({
                    accountNumber: account.accountNumber,
                    meterNumber: meter.meterNumber,
                    location: meter.location || '',
                    consumption: consumption,
                    currentCharges: currentCharges,
                    outstandingCharges: outstandingCharges,
                    previousPayment: previousPayment,
                    amountPaid: amountPaid,
                    notes: notes,
                    existingBillId: existing ? existing.id : null,
                    isPlaceholder: account.isPlaceholder || meter.meterNumber === '—'
                });
            }
        }
        
        // Determine entity status
        let entityStatusClass = 'status-pending';
        let entityStatusText = 'Pending';
        if (isPlaceholder) {
            entityStatusText = 'No account';
            entityStatusClass = 'status-pending';
        } else if (entityHasBills) {
            entityStatusText = 'Paid';
            entityStatusClass = 'status-paid';
        } else if (entityTotalPaid === 0) {
            entityStatusText = 'Not entered';
        } else {
            entityStatusText = 'Partially Paid';
            entityStatusClass = 'status-partial';
        }
        
        // Create entity row
        const entityRow = document.createElement('tr');
        entityRow.className = 'entity-row';
        entityRow.setAttribute('data-entity-type', entity.type);
        entityRow.setAttribute('data-entity-id', entity.id);
        entityRow.setAttribute('data-entity-name', entity.name);
        entityRow.setAttribute('data-has-accounts', !isPlaceholder);
        
        entityRow.innerHTML = `
            <td class="seq-number">${startSerial}</div>
            <td class="entity-header">
                <span class="entity-name">${escapeHtml(entity.name)}</span>
                ${!isPlaceholder ? `<span class="total-due" id="entity-total-${entity.id}">(Total Paid: $${entityTotalPaid.toFixed(2)})</span>` : '<span class="total-due placeholder-text">(No electricity account configured)</span>'}
             </div>
            <td><span class="badge ${entity.type === 'school' ? 'badge-school' : 'badge-department'}">${entity.typeLabel}</span></div>
            <td colspan="6"></div>
            <td></div>
            <td><span class="status-badge ${entityStatusClass}" id="entity-status-${entity.id}">${entityStatusText}</span></div>
            <td class="entity-actions">
                <button class="btn btn-success btn-sm save-entity-btn">💾 Save All</button>
            </div>
        `;
        tbody.appendChild(entityRow);
        
        // Create meter rows
        let isFirstMeterOverall = true;
        let lastAccountNumber = null;
        
        for (let i = 0; i < allMeters.length; i++) {
            const meter = allMeters[i];
            const isFirstMeterForAccount = (meter.accountNumber !== lastAccountNumber);
            lastAccountNumber = meter.accountNumber;
            
            const isPlaceholderMeter = meter.isPlaceholder;
            const disabledAttr = isPlaceholderMeter ? 'disabled' : '';
            const placeholderClass = isPlaceholderMeter ? 'placeholder-text' : '';
            
            const locationDisplay = meter.location ? `<div style="font-size:0.7rem; color:#666;">📍 ${escapeHtml(meter.location)}</div>` : '';
            
            // Account display (only for first meter of each account)
            const accountDisplay = isFirstMeterForAccount ? 
                `<div><span class="account-number">📋 ${escapeHtml(meter.accountNumber)}</span></div>` : '';
            
            // Meter display
            const meterDisplay = `<div class="meter-number">🔢 Meter: ${escapeHtml(meter.meterNumber)}</div>`;
            
            // Amount Paid column - only show input on first meter row of the ENTITY (not per account)
            let amountPaidHtml = '';
            if (isFirstMeterOverall) {
                amountPaidHtml = `<input type="number" step="0.01" class="inline-input amount-paid-input ${placeholderClass}" value="${meter.amountPaid.toFixed(2)}" placeholder="$" ${disabledAttr}>`;
                isFirstMeterOverall = false;
            } else {
                amountPaidHtml = `<div class="amount-paid-disabled">—</div>`;
            }
            
            const meterRow = document.createElement('tr');
            meterRow.className = 'meter-row';
            meterRow.setAttribute('data-account', escapeHtml(meter.accountNumber));
            meterRow.setAttribute('data-meter', escapeHtml(meter.meterNumber));
            if (meter.existingBillId) meterRow.setAttribute('data-bill-id', meter.existingBillId);
            
            meterRow.innerHTML = `
                <td class="seq-number">${isFirstMeterForAccount ? serial : ''}</div>
                <td></div>
                <td></div>
                <td>${accountDisplay}${meterDisplay}${locationDisplay}</div>
                <td><input type="number" step="0.01" class="inline-input consumption-input ${placeholderClass}" value="${meter.consumption.toFixed(2)}" placeholder="kWh" ${disabledAttr}><span class="consumption-unit">kWh</span></div>
                <td><input type="number" step="0.01" class="inline-input current-charge-input ${placeholderClass}" value="${meter.currentCharges.toFixed(2)}" placeholder="$" ${disabledAttr}></div>
                <td><input type="number" step="0.01" class="inline-input outstanding-input ${placeholderClass}" value="${meter.outstandingCharges.toFixed(2)}" placeholder="$" ${disabledAttr}></div>
                <td><input type="number" step="0.01" class="inline-input previous-paid-input ${placeholderClass}" value="${meter.previousPayment.toFixed(2)}" placeholder="$" ${disabledAttr}></div>
                <td class="amount-paid-cell">${amountPaidHtml}</div>
                <td class="notes-cell"><input type="text" class="inline-input notes-input ${placeholderClass}" value="${escapeHtml(meter.notes)}" placeholder="Notes..." ${disabledAttr}></div>
                <td></div>
                <td></div>
            `;
            tbody.appendChild(meterRow);
            
            if (isFirstMeterForAccount) {
                serial++;
            }
        }
        
        return serial;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function matchesSearch(entity, searchTerm) {
        if (!searchTerm) return true;
        const term = searchTerm.toLowerCase();
        if (entity.name.toLowerCase().includes(term)) return true;
        for (const account of entity.accountGroups) {
            if (account.accountNumber && account.accountNumber !== '—' && account.accountNumber.toLowerCase().includes(term)) return true;
            if (account.meters) {
                for (const meter of account.meters) {
                    if (meter.meterNumber && meter.meterNumber !== '—' && meter.meterNumber.toLowerCase().includes(term)) return true;
                }
            }
        }
        return false;
    }

    // Keep all other functions (saveEntityDataBackground, updateEntityTotalDisplay, etc.) exactly the same as your working version
    // ... (rest of your existing functions here) ...

</script>
