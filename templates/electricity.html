<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Electricity Utility - Direct Bill Entry</title>
    <style>
        /* ... KEEP ALL YOUR EXISTING STYLES EXACTLY THE SAME AS YOUR CURRENT electricity.html ... */
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
            --light: #f8f9fa;
            --dark: #343a40;
            --gray: #6c757d;
        }
        /* ... (keep all your existing styles) ... */
    </style>
</head>
<body>
<!-- ... KEEP ALL YOUR EXISTING HTML STRUCTURE EXACTLY THE SAME ... -->

<script>
    // ... KEEP ALL YOUR EXISTING FUNCTIONS EXACTLY THE SAME UP TO renderElectricityTable ...

    // ONLY MODIFY THE renderElectricityTable function - specifically the part that processes meters
    
    async function renderElectricityTable() {
        const month = parseInt(document.getElementById('globalMonth').value);
        const year = parseInt(document.getElementById('globalYear').value);
        currentMonth = month;
        currentYear = year;
        
        const tbody = document.getElementById('billsTableBody');
        tbody.innerHTML = '<tr><td colspan="12" class="no-data">Loading data...<\/td></tr>';
        
        await loadAllEntities();
        await loadExistingBills(month, year);
        
        let allEntities = buildEntityList();
        
        const entityFilter = document.getElementById('entityTypeFilter').value;
        const searchTerm = document.getElementById('searchFilter').value;
        const statusFilter = document.getElementById('statusFilter').value;
        
        let filteredEntities = [];
        for (let i = 0; i < allEntities.length; i++) {
            const entity = allEntities[i];
            if (entityFilter !== 'all' && entity.type !== entityFilter) continue;
            if (searchTerm && !matchesSearch(entity, searchTerm)) continue;
            filteredEntities.push(entity);
        }
        
        if (filteredEntities.length === 0) {
            tbody.innerHTML = '<tr class="no-data-row"><td colspan="12" class="no-data">No matching entities found.<\/td><\/tr>';
            restoreScrollPosition();
            isLoading = false;
            return;
        }
        
        tbody.innerHTML = '';
        let globalSerial = 1;
        
        const schoolsList = filteredEntities.filter(function(e) { return e.type === 'school'; });
        const departmentsList = filteredEntities.filter(function(e) { return e.type === 'department'; });
        
        const schoolsByCluster = new Map();
        for (let i = 0; i < schoolsList.length; i++) {
            const school = schoolsList[i];
            const cluster = school.clusterNumber || 'Unassigned';
            if (!schoolsByCluster.has(cluster)) {
                schoolsByCluster.set(cluster, []);
            }
            schoolsByCluster.get(cluster).push(school);
        }
        
        const clusterOrder = ['CLUSTER 1', 'CLUSTER 2', 'CLUSTER 3', 'CLUSTER 4', 'CLUSTER 5', 'CLUSTER 6', 'Unassigned'];
        
        for (let c = 0; c < clusterOrder.length; c++) {
            const cluster = clusterOrder[c];
            const clusterSchools = schoolsByCluster.get(cluster);
            if (!clusterSchools || clusterSchools.length === 0) continue;
            
            let hasVisibleInCluster = false;
            const visibleClusterEntities = [];
            
            for (let i = 0; i < clusterSchools.length; i++) {
                const entity = clusterSchools[i];
                const visibleAccounts = [];
                let hasAnyVisible = false;
                
                for (let a = 0; a < entity.accountGroups.length; a++) {
                    const account = entity.accountGroups[a];
                    const meters = account.meters || [];
                    const visibleMeters = [];
                    
                    // FIX: Handle accounts with NO meters
                    if (meters.length === 0) {
                        // Create a placeholder meter for accounts without meters
                        const meterNum = '—';
                        const existing = findExistingBill(entity.type, entity.id, account.accountNumber, meterNum, month, year);
                        
                        if (statusFilter === 'all' || 
                            (statusFilter === 'paid' && existing && (existing.amount_paid || 0) > 0) ||
                            (statusFilter === 'pending' && (!existing || (existing.amount_paid || 0) === 0))) {
                            visibleMeters.push({
                                meterNumber: meterNum,
                                location: '',
                                notes: '',
                                existing: existing,
                                billId: existing ? existing.id : null,
                                isPlaceholder: false
                            });
                        }
                    } else {
                        for (let m = 0; m < meters.length; m++) {
                            const meter = meters[m];
                            const meterNum = meter.meterNumber || '—';
                            const existing = findExistingBill(entity.type, entity.id, account.accountNumber, meterNum, month, year);
                            
                            if (statusFilter === 'all' || 
                                (statusFilter === 'paid' && existing && (existing.amount_paid || 0) > 0) ||
                                (statusFilter === 'pending' && (!existing || (existing.amount_paid || 0) === 0))) {
                                visibleMeters.push({
                                    meterNumber: meterNum,
                                    location: meter.location || '',
                                    notes: meter.notes || '',
                                    existing: existing,
                                    billId: existing ? existing.id : null,
                                    isPlaceholder: account.isPlaceholder
                                });
                            }
                        }
                    }
                    
                    if (visibleMeters.length > 0) {
                        hasAnyVisible = true;
                        visibleAccounts.push({
                            accountNumber: account.accountNumber,
                            meters: visibleMeters,
                            isPlaceholder: account.isPlaceholder
                        });
                    }
                }
                if (hasAnyVisible) {
                    hasVisibleInCluster = true;
                    const entityCopy = JSON.parse(JSON.stringify(entity));
                    entityCopy.accountGroups = visibleAccounts;
                    visibleClusterEntities.push(entityCopy);
                }
            }
            
            if (hasVisibleInCluster && visibleClusterEntities.length > 0) {
                let totalMeters = 0;
                for (let i = 0; i < visibleClusterEntities.length; i++) {
                    const e = visibleClusterEntities[i];
                    for (let a = 0; a < e.accountGroups.length; a++) {
                        totalMeters += e.accountGroups[a].meters.length;
                    }
                }
                
                const separatorRow = document.createElement('tr');
                separatorRow.className = 'cluster-separator';
                separatorRow.innerHTML = '<td colspan="12"><div class="cluster-info"><span>🏫 ' + cluster + '</span><span class="cluster-count">' + visibleClusterEntities.length + ' entit' + (visibleClusterEntities.length > 1 ? 'ies' : 'y') + ', ' + totalMeters + ' meter' + (totalMeters > 1 ? 's' : '') + '</span></div></td>';
                tbody.appendChild(separatorRow);
                
                for (let i = 0; i < visibleClusterEntities.length; i++) {
                    globalSerial = await renderEntity(tbody, visibleClusterEntities[i], month, year, globalSerial);
                }
            }
        }
        
        // Departments section - same fix applied
        const deptByDepartmentName = new Map();
        for (let i = 0; i < departmentsList.length; i++) {
            const dept = departmentsList[i];
            const deptName = dept.departmentName || 'Other';
            if (!deptByDepartmentName.has(deptName)) {
                deptByDepartmentName.set(deptName, []);
            }
            deptByDepartmentName.get(deptName).push(dept);
        }
        
        const deptNamesInOrder = [];
        for (let i = 0; i < departmentsList.length; i++) {
            const dept = departmentsList[i];
            const deptName = dept.departmentName || 'Other';
            if (deptNamesInOrder.indexOf(deptName) === -1) {
                deptNamesInOrder.push(deptName);
            }
        }
        
        for (let d = 0; d < deptNamesInOrder.length; d++) {
            const deptName = deptNamesInOrder[d];
            const deptsInGroup = deptByDepartmentName.get(deptName);
            if (!deptsInGroup || deptsInGroup.length === 0) continue;
            
            let hasVisibleInGroup = false;
            const visibleGroupEntities = [];
            
            for (let i = 0; i < deptsInGroup.length; i++) {
                const entity = deptsInGroup[i];
                const visibleAccounts = [];
                let hasAnyVisible = false;
                
                for (let a = 0; a < entity.accountGroups.length; a++) {
                    const account = entity.accountGroups[a];
                    const meters = account.meters || [];
                    const visibleMeters = [];
                    
                    // FIX: Handle accounts with NO meters
                    if (meters.length === 0) {
                        const meterNum = '—';
                        const existing = findExistingBill(entity.type, entity.id, account.accountNumber, meterNum, month, year);
                        
                        if (statusFilter === 'all' || 
                            (statusFilter === 'paid' && existing && (existing.amount_paid || 0) > 0) ||
                            (statusFilter === 'pending' && (!existing || (existing.amount_paid || 0) === 0))) {
                            visibleMeters.push({
                                meterNumber: meterNum,
                                location: '',
                                notes: '',
                                existing: existing,
                                billId: existing ? existing.id : null,
                                isPlaceholder: false
                            });
                        }
                    } else {
                        for (let m = 0; m < meters.length; m++) {
                            const meter = meters[m];
                            const meterNum = meter.meterNumber || '—';
                            const existing = findExistingBill(entity.type, entity.id, account.accountNumber, meterNum, month, year);
                            
                            if (statusFilter === 'all' || 
                                (statusFilter === 'paid' && existing && (existing.amount_paid || 0) > 0) ||
                                (statusFilter === 'pending' && (!existing || (existing.amount_paid || 0) === 0))) {
                                visibleMeters.push({
                                    meterNumber: meterNum,
                                    location: meter.location || '',
                                    notes: meter.notes || '',
                                    existing: existing,
                                    billId: existing ? existing.id : null,
                                    isPlaceholder: account.isPlaceholder
                                });
                            }
                        }
                    }
                    
                    if (visibleMeters.length > 0) {
                        hasAnyVisible = true;
                        visibleAccounts.push({
                            accountNumber: account.accountNumber,
                            meters: visibleMeters,
                            isPlaceholder: account.isPlaceholder
                        });
                    }
                }
                if (hasAnyVisible) {
                    hasVisibleInGroup = true;
                    const entityCopy = JSON.parse(JSON.stringify(entity));
                    entityCopy.accountGroups = visibleAccounts;
                    visibleGroupEntities.push(entityCopy);
                }
            }
            
            if (hasVisibleInGroup && visibleGroupEntities.length > 0) {
                let totalMeters = 0;
                for (let i = 0; i < visibleGroupEntities.length; i++) {
                    const e = visibleGroupEntities[i];
                    for (let a = 0; a < e.accountGroups.length; a++) {
                        totalMeters += e.accountGroups[a].meters.length;
                    }
                }
                
                const deptSeparator = document.createElement('tr');
                deptSeparator.className = 'department-group-separator';
                deptSeparator.innerHTML = '<td colspan="12"><div class="dept-group-info"><span class="department-name-badge">🏢 ' + escapeHtml(deptName) + '</span><span class="dept-group-count">' + visibleGroupEntities.length + ' unit' + (visibleGroupEntities.length > 1 ? 's' : '') + ', ' + totalMeters + ' meter' + (totalMeters > 1 ? 's' : '') + '</span></div></td>';
                tbody.appendChild(deptSeparator);
                
                for (let i = 0; i < visibleGroupEntities.length; i++) {
                    globalSerial = await renderEntity(tbody, visibleGroupEntities[i], month, year, globalSerial);
                }
            }
        }
        
        restoreScrollPosition();
        isLoading = false;
        showLoading(false);
    }
    
    // ... KEEP ALL YOUR OTHER FUNCTIONS (renderEntity, escapeHtml, attachEventListeners, etc.) EXACTLY THE SAME ...
    
</script>
</body>
</html>
