<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reports & Print - Utility Bills Management</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        /* (CSS remains exactly the same as the previous full code – no changes needed) */
        :root { --primary: #1a56db; /* ... all existing styles ... */ }
        /* ... (omitted for brevity, but include everything from the previous full version) ... */
        .balance-row td:first-child { padding-right: 12px; }
        /* ... rest of the CSS ... */
    </style>
</head>
<body>
    <!-- ===== NAVBAR AND PAGE CONTENT ===== -->
    <nav class="navbar">...</nav>

    <div class="container">
        <!-- ===== ALL HTML remains exactly as before ===== -->
        <!-- The checkbox "showAllEntities" is already present -->
        ...
    </div>

    <div class="processing-overlay" id="processingOverlay">...</div>
    <div id="printPreviewContainer" style="display:none;"></div>

    <script>
        // ====== GLOBALS (unchanged) ======
        // ...

        // ====== generatePrintPreviewWithEntities (UPDATED with includeZeroBills) ======
        function generatePrintPreviewWithEntities(entityData, month, year, selectedColumns, itemsPerPage, utilityTypes, shouldPaginate, showSubtotals, groupByEntity, includeZeroBills, approvalDetails, subtotalOptions) {
            const monthNames = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
            const monthName = month !== 'all' ? monthNames[parseInt(month) - 1] : 'All Months';
            const yearDisplay = year !== 'all' ? year : 'All Years';
            const hasTelephone = utilityTypes.includes('telephone');
            const hasWater = utilityTypes.includes('water');
            const hasElectricity = utilityTypes.includes('electricity');
            const hasWaterElectricity = hasWater || hasElectricity;
            const headerInfo = getUtilityHeader(utilityTypes);
            const titleText = headerInfo.title;
            const now = new Date();
            const reportDate = now.toLocaleDateString('en-US', {
                year: 'numeric', month: 'long', day: 'numeric', hour: '2-digit', minute: '2-digit'
            });
            const currentDate = now.toLocaleDateString('en-GB', { day: '2-digit', month: '2-digit', year: 'numeric' });

            // Subtotal column keys that should be merged per entity
            const subtotalKeys = [];
            if (subtotalOptions.showConsumption) subtotalKeys.push('totalConsumption');
            if (subtotalOptions.showBillAmount) subtotalKeys.push('totalBillAmount');
            if (subtotalOptions.showOutstanding) subtotalKeys.push('totalOutstanding');

            // --- Build column configuration (unchanged) ---
            let colConfig = [];
            colConfig.push({ key: 'no', label: 'No.', show: true, required: true });
            if (selectedColumns.entityName !== false) colConfig.push({ key: 'entityName', label: 'Entity Name', show: true });
            if (selectedColumns.entityType !== false) colConfig.push({ key: 'entityType', label: 'Type', show: true });

            if (hasWaterElectricity) {
                if (selectedColumns.accountNumber !== false) colConfig.push({ key: 'accountNumber', label: 'Account No.', show: true });
                if (selectedColumns.meterNumber !== false) colConfig.push({ key: 'meterTelNo', label: 'Meter No.', show: true });
                if (selectedColumns.consumption !== false) colConfig.push({ key: 'consumption', label: hasWater ? 'Consumption (m³)' : 'Consumption (kWh)', show: true });
                if (selectedColumns.billAmount !== false) colConfig.push({ key: 'billAmount', label: 'Bill Amount ($)', show: true });
                if (selectedColumns.amountPaid !== false) colConfig.push({ key: 'amountPaid', label: 'Amount Paid ($)', show: true });
                if (selectedColumns.outstanding !== false) colConfig.push({ key: 'outstanding', label: 'Outstanding ($)', show: true });
                if (subtotalOptions.showConsumption) colConfig.push({ key: 'totalConsumption', label: 'Total Consumption', show: true });
                if (subtotalOptions.showBillAmount) colConfig.push({ key: 'totalBillAmount', label: 'Total Bill Amount ($)', show: true });
                if (subtotalOptions.showOutstanding) colConfig.push({ key: 'totalOutstanding', label: 'Total Outstanding ($)', show: true });
            }

            if (hasTelephone) {
                if (selectedColumns.accountNumber !== false) colConfig.push({ key: 'accountNumber', label: 'Account No.', show: true });
                if (selectedColumns.phoneNumber !== false) colConfig.push({ key: 'meterTelNo', label: 'Phone No.', show: true });
                if (selectedColumns.billNumber !== false) colConfig.push({ key: 'billNumber', label: 'Bill No.', show: true });
                if (selectedColumns.rentalAmount !== false) colConfig.push({ key: 'rentalAmount', label: 'Rental Amount ($)', show: true });
                if (selectedColumns.totalAmount !== false) colConfig.push({ key: 'totalAmount', label: 'Total Amount ($)', show: true });
                if (selectedColumns.totalAccountCharges !== false) colConfig.push({ key: 'totalAccountCharges', label: 'Total Account Charges ($)', show: true });
                if (selectedColumns.previousOutstanding !== false) colConfig.push({ key: 'previousOutstanding', label: 'Previous Outstanding ($)', show: true });
                if (selectedColumns.previousPayment !== false) colConfig.push({ key: 'previousPayment', label: 'Previous Payment ($)', show: true });
                if (selectedColumns.totalCurrentCharges !== false) colConfig.push({ key: 'totalCurrentCharges', label: 'Total Current Charges ($)', show: true });
                if (selectedColumns.amountPaid !== false) colConfig.push({ key: 'amountPaid', label: 'Amount Paid ($)', show: true });
            }

            if (selectedColumns.period !== false) colConfig.push({ key: 'period', label: 'Period', show: true });

            const visibleCols = colConfig.filter(c => c.show !== false);

            const utilityTypeLabels = utilityTypes.map(u => {
                if (u === 'water') return '💧 Water';
                if (u === 'electricity') return '⚡ Electricity';
                if (u === 'telephone') return '📞 Telephone';
                return u;
            }).join(', ');

            // --- Determine summary and balance column indices (unchanged) ---
            let summaryColIndex = visibleCols.length - 1;
            if (hasTelephone) {
                const totalCurrentIdx = visibleCols.findIndex(c => c.key === 'totalCurrentCharges');
                if (totalCurrentIdx !== -1) summaryColIndex = totalCurrentIdx;
                else {
                    const totalAccountIdx = visibleCols.findIndex(c => c.key === 'totalAccountCharges');
                    if (totalAccountIdx !== -1) summaryColIndex = totalAccountIdx;
                }
            } else if (hasWaterElectricity) {
                const totalBillIdx = visibleCols.findIndex(c => c.key === 'totalBillAmount');
                if (totalBillIdx !== -1) {
                    summaryColIndex = totalBillIdx;
                } else {
                    const billIdx = visibleCols.findIndex(c => c.key === 'billAmount');
                    if (billIdx !== -1) summaryColIndex = billIdx;
                    else {
                        const consIdx = visibleCols.findIndex(c => c.key === 'consumption' || c.key === 'totalConsumption');
                        if (consIdx !== -1) summaryColIndex = consIdx;
                    }
                }
            }
            if (summaryColIndex < 0) summaryColIndex = 0;

            let balanceColIndex = -1;
            if (hasWaterElectricity) {
                const totalBillIdx = visibleCols.findIndex(c => c.key === 'totalBillAmount');
                if (totalBillIdx !== -1) {
                    balanceColIndex = totalBillIdx;
                } else {
                    const billIdx = visibleCols.findIndex(c => c.key === 'billAmount');
                    if (billIdx !== -1) balanceColIndex = billIdx;
                }
            }

            let tableClass = 'print-table-water';
            if (hasTelephone) tableClass = 'print-table-telephone';
            else if (hasElectricity) tableClass = 'print-table-electricity';

            // ========== NEW: Function to determine bill amount for filtering ==========
            function getBillAmount(bill) {
                if (hasTelephone) {
                    return bill.totalAccountCharges || 0;
                } else {
                    return bill.current_charges || bill.bill_amount || 0;
                }
            }

            // --- DEDUPLICATE and optionally FILTER zero-amount bills per entity ---
            let entityInfo = [];
            for (const entityGroup of entityData) {
                const entity = entityGroup.entity;
                const entityType = entityGroup.type;
                const bills = entityGroup.bills;
                const entityName = entity.name || (entityType === 'school' ? 'School #' + entity.id : 'Dept #' + entity.id);

                // Deduplicate bills (keep first occurrence)
                const uniqueBills = [];
                const seen = new Set();
                bills.forEach(bill => {
                    const key = (bill.account_number || '') + '|' + (bill.meter_number || '');
                    if (!seen.has(key)) {
                        seen.add(key);
                        uniqueBills.push(bill);
                    }
                });

                // ===== FILTER: remove zero-amount bills ONLY if includeZeroBills is false =====
                let filteredBills = uniqueBills;
                if (!includeZeroBills) {
                    filteredBills = uniqueBills.filter(bill => {
                        const amt = getBillAmount(bill);
                        return Math.abs(amt) > 0.005;
                    });
                }

                // If no bills remain and we are NOT including zero bills, skip this entity
                if (filteredBills.length === 0 && !includeZeroBills) continue;

                // If includeZeroBills is true, we keep all bills, even if they are zero.
                // Compute totals (sum of all bills)
                const consumption = filteredBills.reduce((sum, b) => sum + (b.consumption || 0), 0);
                const billAmount = filteredBills.reduce((sum, b) => sum + (b.current_charges || b.bill_amount || 0), 0);
                const outstanding = filteredBills.reduce((sum, b) => sum + (b.unsettled_charges || b.outstanding || 0), 0);

                // Determine if this entity has any non-zero bills (for styling)
                const hasNonZero = filteredBills.some(bill => {
                    const amt = getBillAmount(bill);
                    return Math.abs(amt) > 0.005;
                });

                entityInfo.push({
                    entityId: entity.id,
                    entityName: entityName,
                    entityType: entityType,
                    bills: filteredBills,
                    isZeroBill: !hasNonZero, // true if all bills are zero (or no bills)
                    entity: entity,
                    totals: { consumption, billAmount, outstanding }
                });
            }

            // Compute grand totals (same as before)
            let grandTotalBillAmount = 0, grandTotalAmountPaid = 0, grandTotalOutstanding = 0;
            let grandTotalRentalAmount = 0, grandTotalTotalAmount = 0, grandTotalAccountCharges = 0;
            let grandTotalPrevOutstanding = 0, grandTotalPrevPayment = 0, grandTotalCurrentCharges = 0;
            let grandTotalConsumption = 0;

            // Pagination logic (unchanged)
            let pages = [];
            if (shouldPaginate) {
                const rowsPerPage = Math.max(1, itemsPerPage);
                let currentPage = [], currentRowCount = 0;
                for (let i = 0; i < entityInfo.length; i++) {
                    const info = entityInfo[i];
                    let rowsForEntity = Math.max(info.bills.length, 1);
                    if (currentRowCount + rowsForEntity > rowsPerPage && currentPage.length > 0) {
                        pages.push(currentPage);
                        currentPage = [];
                        currentRowCount = 0;
                    }
                    currentPage.push(info);
                    currentRowCount += rowsForEntity;
                }
                if (currentPage.length > 0) pages.push(currentPage);
            } else {
                pages = [entityInfo];
            }

            let totalPages = pages.length;
            let pageIndex = 0;
            let cumulativeTotal = 0;
            let globalSerial = 1;

            // ---- Helper: render a detail row (unchanged) ----
            function renderDetailRow(row, serial, isFirst, rowspan, visibleCols, hasWaterElectricity, hasTelephone, entityName, entityType, entity, entityTotals, subtotalKeys) {
                const rowspanColumns = ['no', 'entityName', 'entityType', ...subtotalKeys];
                let html = '';
                const detailClass = isFirst ? 'entity-group-header' : 'entity-group-detail';
                const isZeroRow = row.isZeroBill || false;
                const zeroClass = isZeroRow ? 'entity-zero-bill' : '';
                html += `<tr class="${zeroClass} ${detailClass}">`;

                for (let i = 0; i < visibleCols.length; i++) {
                    const col = visibleCols[i];
                    const colKey = col.key;
                    const isRowspanCol = rowspanColumns.includes(colKey);

                    if (isRowspanCol) {
                        if (isFirst) {
                            const rowspanAttr = (rowspan > 1) ? ` rowspan="${rowspan}"` : '';
                            if (colKey === 'no') {
                                html += `<td style="text-align:center; vertical-align:middle;"${rowspanAttr}>${serial}</td>`;
                            } else if (colKey === 'entityName') {
                                html += `<td class="entity-name-cell" style="vertical-align:middle; max-width:120px; word-break:break-word; font-size:8.5pt; text-align:left;"${rowspanAttr}>${escapeHtml(entityName)}</td>`;
                            } else if (colKey === 'entityType') {
                                html += `<td style="text-align:center;"${rowspanAttr}>${entityType === 'school' ? '🏫 School' : '🏛️ Department'}</td>`;
                            } else if (colKey === 'totalConsumption') {
                                const unit = hasWater ? 'm³' : 'kWh';
                                html += `<td style="text-align:center; font-size:8pt;"${rowspanAttr}>${formatNumberWithCommas(entityTotals.consumption)} ${unit}</td>`;
                            } else if (colKey === 'totalBillAmount') {
                                html += `<td class="currency-cell" style="font-size:8pt; text-align:center;"${rowspanAttr}>${formatNumberWithCommas(entityTotals.billAmount)}</td>`;
                            } else if (colKey === 'totalOutstanding') {
                                html += `<td class="currency-cell" style="font-size:8pt; text-align:center;"${rowspanAttr}>${formatNumberWithCommas(entityTotals.outstanding)}</td>`;
                            }
                        }
                    } else {
                        if (colKey === 'accountNumber') {
                            let acc = row.accountNumber || row.account_number;
                            if (!acc || acc === '—' || acc === '') {
                                if (hasWater) acc = entity.water_account || '—';
                                else if (hasElectricity) acc = entity.electricity_account || '—';
                                else if (hasTelephone) acc = entity.telephone_account || '—';
                            }
                            html += `<td class="mono-cell" style="font-size:8pt; word-break:break-word; text-align:center;">${escapeHtml(acc)}</td>`;
                        } else if (colKey === 'meterTelNo') {
                            let meter = '—';
                            if (hasTelephone) {
                                meter = row.phoneNumber || row.phone_number || '—';
                            } else {
                                meter = row.meterTelNo || row.meter_number || '—';
                            }
                            html += `<td class="mono-cell" style="font-size:8pt; text-align:center;">${escapeHtml(meter)}</td>`;
                        } else if (colKey === 'consumption') {
                            const unit = hasWater ? 'm³' : 'kWh';
                            html += `<td style="text-align:center; font-size:8pt;">${formatNumberWithCommas(row.consumption)} ${unit}</td>`;
                        } else if (colKey === 'billAmount') {
                            html += `<td class="currency-cell" style="font-size:8pt; text-align:center;">${formatNumberWithCommas(row.billAmount)}</td>`;
                        } else if (colKey === 'amountPaid') {
                            html += `<td class="currency-cell" style="font-size:8pt; text-align:center;">${formatNumberWithCommas(row.amountPaid)}</td>`;
                        } else if (colKey === 'outstanding') {
                            html += `<td class="currency-cell" style="font-size:8pt; text-align:center;">${formatNumberWithCommas(row.outstanding)}</td>`;
                        } else if (colKey === 'period') {
                            html += `<td class="period-column" style="font-size:8pt; text-align:center;">${row.period || '—'}</td>`;
                        } else {
                            html += `<td>&nbsp;</td>`;
                        }
                    }
                }
                html += '</tr>';
                return html;
            }

            // ========== BUILD HTML (unchanged except for the balance c/f spacing which is already in CSS) ==========
            let printHtml = `
                <!DOCTYPE html>
                <html>
                <head>
                    <meta charset="UTF-8">
                    <title>&nbsp;</title>
                    <style>
                        /* (all the print styles, including the balance c/f padding) */
                        ... /* same as before */
                        .balance-row td:first-child { padding-right: 12px; }
                    </style>
                </head>
                <body>
            `;

            // ---- Render pages (same logic, but now the entityInfo includes zero-bill entities) ----
            pages.forEach((pageEntityInfo, idx) => {
                pageIndex++;
                const isLastPage = (pageIndex === totalPages);
                const previousCumulative = cumulativeTotal;
                let pageTotalBillAmount = 0, pageTotalAmountPaid = 0, pageTotalOutstanding = 0;
                let pageTotalCurrent = 0, pageTotalAccount = 0, pageTotalConsumption = 0;
                pageEntityInfo.forEach(info => {
                    const bills = info.bills;
                    const consumption = bills.reduce((sum, b) => sum + (b.consumption || 0), 0);
                    const billAmount = bills.reduce((sum, b) => sum + (b.current_charges || b.bill_amount || 0), 0);
                    const outstanding = bills.reduce((sum, b) => sum + (b.unsettled_charges || b.outstanding || 0), 0);
                    const amountPaid = bills.reduce((sum, b) => sum + (b.amount_paid || 0), 0);
                    const totalCurrent = bills.reduce((sum, b) => sum + (b.totalCurrentCharges || 0), 0);
                    const totalAccount = bills.reduce((sum, b) => sum + (b.totalAccountCharges || 0), 0);
                    pageTotalConsumption += consumption;
                    pageTotalBillAmount += billAmount;
                    pageTotalOutstanding += outstanding;
                    pageTotalAmountPaid += amountPaid;
                    pageTotalCurrent += totalCurrent;
                    pageTotalAccount += totalAccount;
                });
                cumulativeTotal += pageTotalBillAmount;

                // Balance b/f (only if pagination and page > 1)
                let bfHtml = '';
                if (hasWaterElectricity && shouldPaginate && pageIndex > 1) {
                    const bfAmount = previousCumulative;
                    bfHtml = `
                        <div class="balance-bf-wrapper">
                            <span class="bf-label">Balance b/f</span>
                            <span class="bf-amount">${formatNumberWithCommas(bfAmount)}</span>
                        </div>
                    `;
                }

                printHtml += `
                    <div class="print-page">
                        <div class="print-header">
                            <div class="report-title-print">KEMENTERIAN PENDIDIKAN</div>
                            <div class="report-subtitle-print">${titleText}</div>
                            <div class="report-date-print">For ${monthName} ${yearDisplay} | Generated: ${reportDate}</div>
                            <p style="font-size:8pt; margin-top:2px;">Utilities: ${utilityTypeLabels}</p>
                            ${totalPages > 1 ? `<p style="font-size:8pt;">Page ${pageIndex} of ${totalPages}</p>` : ''}
                        </div>
                        ${bfHtml}
                        <div class="table-wrapper-scroll">
                            <table class="print-table ${tableClass}">
                                <thead>
                                    <tr>
                                        ${visibleCols.map(c => `<th style="font-size:8pt; white-space:nowrap; text-align:center;">${c.label}</th>`).join('')}
                                    </tr>
                                </thead>
                                <tbody>
                `;

                // ---- Render entities ----
                for (let eIdx = 0; eIdx < pageEntityInfo.length; eIdx++) {
                    const info = pageEntityInfo[eIdx];
                    const bills = info.bills;
                    const entityName = info.entityName;
                    const entityType = info.entityType;
                    const entity = info.entity;
                    const entityTotals = info.totals || { consumption: 0, billAmount: 0, outstanding: 0 };

                    grandTotalConsumption += entityTotals.consumption;
                    grandTotalBillAmount += entityTotals.billAmount;
                    grandTotalOutstanding += entityTotals.outstanding;
                    grandTotalAmountPaid += bills.reduce((sum, b) => sum + (b.amount_paid || 0), 0);

                    const rowspan = bills.length > 0 ? bills.length : 1;
                    if (bills.length === 0) {
                        // This case should not happen because we always have at least one bill (even zero)
                        // but we'll add a placeholder row
                        const rowData = {
                            entityName, entityType, isZeroBill: true,
                            accountNumber: '—', meterTelNo: '—', phoneNumber: '—',
                            consumption: 0, billAmount: 0, amountPaid: 0, outstanding: 0,
                            period: '—', billNumber: '—', rentalAmount: 0, totalAmount: 0,
                            totalAccountCharges: 0, previousOutstanding: 0, previousPayment: 0,
                            totalCurrentCharges: 0, utilityType: utilityTypes[0]
                        };
                        printHtml += renderDetailRow(rowData, globalSerial, true, 1, visibleCols, hasWaterElectricity, hasTelephone, entityName, entityType, entity, entityTotals, subtotalKeys);
                        globalSerial++;
                    } else {
                        for (let b = 0; b < bills.length; b++) {
                            const bill = bills[b];
                            const isFirst = (b === 0);
                            const isZeroBill = (Math.abs(getBillAmount(bill)) <= 0.005);
                            const rowData = {
                                entityName, entityType,
                                isZeroBill: isZeroBill,
                                accountNumber: bill.account_number || '—',
                                meterTelNo: bill.meter_number || '—',
                                phoneNumber: bill.phone_number || '—',
                                consumption: bill.consumption_kwh || bill.consumption || 0,
                                billAmount: bill.current_charges || bill.bill_amount || 0,
                                amountPaid: bill.amount_paid || 0,
                                outstanding: bill.unsettled_charges || bill.outstanding || 0,
                                period: bill.period || '—',
                                billNumber: bill.bill_number || '—',
                                rentalAmount: bill.rental_amount || 0,
                                totalAmount: bill.total_amount || 0,
                                totalAccountCharges: bill.totalAccountCharges || 0,
                                previousOutstanding: bill.previous_outstanding || 0,
                                previousPayment: bill.previous_payment || 0,
                                totalCurrentCharges: bill.total_current_charges || 0,
                                utilityType: bill.utilityType || utilityTypes[0]
                            };
                            printHtml += renderDetailRow(rowData, globalSerial, isFirst, rowspan, visibleCols, hasWaterElectricity, hasTelephone, entityName, entityType, entity, entityTotals, subtotalKeys);
                            if (isFirst) globalSerial++;
                        }
                    }
                }

                // ---- Page Total, Balance c/f, Grand Total (same as before) ----
                let pageTotalValue = pageTotalCurrent;
                if (hasTelephone) {
                    if (visibleCols.some(c => c.key === 'totalCurrentCharges')) pageTotalValue = pageTotalCurrent;
                    else if (visibleCols.some(c => c.key === 'totalAccountCharges')) pageTotalValue = pageTotalAccount;
                } else if (hasWaterElectricity) {
                    if (visibleCols.some(c => c.key === 'totalBillAmount')) pageTotalValue = pageTotalBillAmount;
                    else if (visibleCols.some(c => c.key === 'billAmount')) pageTotalValue = pageTotalBillAmount;
                    else if (visibleCols.some(c => c.key === 'totalConsumption')) pageTotalValue = pageTotalConsumption;
                    else if (visibleCols.some(c => c.key === 'consumption')) pageTotalValue = pageTotalConsumption;
                    else pageTotalValue = pageTotalBillAmount;
                }

                if (pageEntityInfo.length > 0) {
                    printHtml += `<tr class="summary-row">`;
                    visibleCols.forEach((col, idx) => {
                        if (idx === summaryColIndex) {
                            printHtml += `<td class="currency-cell" style="font-weight:600;">${formatNumberWithCommas(pageTotalValue)}</td>`;
                        } else if (idx < summaryColIndex) {
                            if (idx === summaryColIndex - 1) {
                                printHtml += `<td style="font-weight:600;">Page Total:</td>`;
                            } else {
                                printHtml += `<td>&nbsp;</td>`;
                            }
                        } else {
                            printHtml += `<td>&nbsp;</td>`;
                        }
                    });
                    printHtml += `</tr>`;
                }

                // Balance c/f (only if pagination and not last page)
                if (hasWaterElectricity && pageIndex < totalPages) {
                    const cfAmount = cumulativeTotal;
                    let balanceHtml = `<tr class="balance-row">`;
                    if (balanceColIndex > 0) {
                        balanceHtml += `<td colspan="${balanceColIndex}" style="text-align:right; font-weight:700; padding-right:12px;"><span class="balance-label">Balance c/f</span></td>`;
                    } else {
                        balanceHtml += `<td style="text-align:right; font-weight:700; padding-right:12px;"><span class="balance-label">Balance c/f</span></td>`;
                    }
                    balanceHtml += `<td class="currency-cell" style="font-weight:700; text-align:center;">${formatNumberWithCommas(cfAmount)}</td>`;
                    for (let i = balanceColIndex + 1; i < visibleCols.length; i++) {
                        balanceHtml += `<td>&nbsp;</td>`;
                    }
                    balanceHtml += `</tr>`;
                    printHtml += balanceHtml;
                }

                // Grand Total (only last page)
                if (isLastPage) {
                    let totalValueForSummary = grandTotalCurrentCharges;
                    if (hasTelephone) {
                        if (visibleCols.some(c => c.key === 'totalCurrentCharges')) totalValueForSummary = grandTotalCurrentCharges;
                        else if (visibleCols.some(c => c.key === 'totalAccountCharges')) totalValueForSummary = grandTotalAccountCharges;
                    } else if (hasWaterElectricity) {
                        if (visibleCols.some(c => c.key === 'totalBillAmount')) totalValueForSummary = grandTotalBillAmount;
                        else if (visibleCols.some(c => c.key === 'billAmount')) totalValueForSummary = grandTotalBillAmount;
                        else if (visibleCols.some(c => c.key === 'totalConsumption')) totalValueForSummary = grandTotalConsumption;
                        else if (visibleCols.some(c => c.key === 'consumption')) totalValueForSummary = grandTotalConsumption;
                        else totalValueForSummary = grandTotalBillAmount;
                    }
                    printHtml += `<tr class="total-sum-row">`;
                    visibleCols.forEach((col, idx) => {
                        if (idx === summaryColIndex) {
                            printHtml += `<td class="currency-cell" style="font-weight:700;">${formatNumberWithCommas(totalValueForSummary)}</td>`;
                        } else if (idx < summaryColIndex) {
                            if (idx === summaryColIndex - 1) {
                                printHtml += `<td style="font-weight:700;">Total Sum:</td>`;
                            } else {
                                printHtml += `<td>&nbsp;</td>`;
                            }
                        } else {
