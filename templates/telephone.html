<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telephone Utility - Direct Bill Entry</title>
    <style>
        /* ... (keep all your existing styles exactly the same) ... */
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #28a745;
            --danger: #dc3545;
            --warning: #ffc107;
            --info: #17a2b8;
            --light: #f8f9fa;
            --dark: #343a40;
            --gray: #6c757d;
            --bill-shade: #fff8e1;
            --bill-border: #ff9800;
        }
        /* ... keep all existing styles ... */
    </style>
</head>
<body>
<!-- ... keep all existing HTML structure exactly the same ... -->

<script>
    let allSchools = [];
    let allDepartments = [];
    let existingBills = [];
    let existingSummaryData = {};
    let currentMonth = new Date().getMonth() + 1;
    let currentYear = new Date().getFullYear();
    let isLoading = false;
    let savingEntities = new Set();
    let activeSavingToast = null;
    
    let savedScrollPosition = 0;

    function saveScrollPosition() {
        const wrapper = document.querySelector('.table-wrapper');
        if (wrapper) {
            savedScrollPosition = wrapper.scrollTop;
        }
    }

    function restoreScrollPosition() {
        const wrapper = document.querySelector('.table-wrapper');
        if (wrapper && savedScrollPosition > 0) {
            setTimeout(() => {
                wrapper.scrollTop = savedScrollPosition;
            }, 50);
        }
    }

    function showLoading(show) {
        document.getElementById('loadingOverlay').classList.toggle('active', show);
    }

    function showSavingToast(entityName) {
        if (activeSavingToast) {
            activeSavingToast.remove();
        }
        const toast = document.createElement('div');
        toast.className = 'saving-toast';
        toast.innerHTML = `<span class="saving-spinner"></span> Saving ${entityName}... Please wait`;
        document.body.appendChild(toast);
        activeSavingToast = toast;
        return toast;
    }

    function hideSavingToast() {
        if (activeSavingToast) {
            activeSavingToast.remove();
            activeSavingToast = null;
        }
    }

    function showToast(message, isError = false) {
        const toast = document.createElement('div');
        toast.className = isError ? 'error-toast' : 'success-toast';
        toast.textContent = message;
        document.body.appendChild(toast);
        setTimeout(() => toast.remove(), 4000);
    }

    function populateYears() {
        const yearSelect = document.getElementById('globalYear');
        if (!yearSelect) {
            console.error('Year select element not found');
            return;
        }
        yearSelect.innerHTML = '';
        const start = 2020;
        const end = 2035;
        for (let y = start; y <= end; y++) {
            const opt = document.createElement('option');
            opt.value = y;
            opt.textContent = y;
            if (y === currentYear) opt.selected = true;
            yearSelect.appendChild(opt);
        }
    }

    async function loadAllEntities() {
        try {
            const [schoolsRes, deptsRes] = await Promise.all([
                fetch('/api/schools'),
                fetch('/api/departments')
            ]);
            if (schoolsRes.ok) {
                allSchools = await schoolsRes.json();
            }
            if (deptsRes.ok) {
                allDepartments = await deptsRes.json();
            }
            console.log(`Loaded ${allSchools.length} schools, ${allDepartments.length} departments`);
        } catch(e) {
            console.error("Error loading entities:", e);
        }
    }

    async function loadExistingBills(month, year) {
        try {
            const url = `/api/utility-bills?utility_type=telephone&month=${month}&year=${year}`;
            const resp = await fetch(url);
            if (resp.ok) {
                existingBills = await resp.json();
                existingSummaryData = {};
                for (const bill of existingBills) {
                    if (bill.notes && bill.notes.startsWith('{')) {
                        try {
                            const summaryData = JSON.parse(bill.notes);
                            if (summaryData.isSummary) {
                                const key = `${bill.entity_type}_${bill.entity_id}`;
                                existingSummaryData[key] = {
                                    previousOutstanding: summaryData.previousOutstanding || 0,
                                    previousPayment: summaryData.previousPayment || 0,
                                    totalAccountCharges: summaryData.totalAccountCharges || 0,
                                    amountPaid: summaryData.amountPaid || 0
                                };
                            }
                        } catch(e) {}
                    }
                }
                console.log(`Loaded ${existingBills.length} bills. Details:`, existingBills.map(b => ({id: b.id, phone: b.phone_number, charges: b.current_charges, total: b.notes ? 'has notes' : 'no notes'})));
            } else {
                existingBills = [];
            }
            console.log(`Loaded ${existingBills.length} existing telephone bills for ${month}/${year}`);
        } catch(e) {
            console.error(e);
            existingBills = [];
        }
    }

    function extractTelephoneAccounts(entity) {
        let accounts = [];
        try {
            if (entity.telephone_accounts && typeof entity.telephone_accounts === 'string') {
                const parsed = JSON.parse(entity.telephone_accounts);
                if (Array.isArray(parsed) && parsed.length > 0) {
                    accounts = parsed;
                }
            } else if (entity.telephone_accounts && Array.isArray(entity.telephone_accounts)) {
                accounts = entity.telephone_accounts;
            } else if (entity.telephone_account) {
                const numbers = [];
                if (entity.telephone_number) {
                    numbers.push({ phoneNumber: entity.telephone_number, location: '', notes: '' });
                }
                accounts = [{ accountNumber: entity.telephone_account, numbers: numbers }];
            }
        } catch(e) {
            console.error("Error parsing telephone accounts:", e);
        }
        return accounts;
    }

    function buildEntityList() {
        const entities = [];
        
        for (let idx = 0; idx < allSchools.length; idx++) {
            const school = allSchools[idx];
            const accounts = extractTelephoneAccounts(school);
            
            let accountGroups = accounts;
            let hasAccounts = accounts.length > 0;
            
            if (!hasAccounts) {
                accountGroups = [{
                    accountNumber: '—',
                    numbers: [{ phoneNumber: '—', location: '', notes: '' }],
                    isPlaceholder: true
                }];
            }
            
            let cluster = school.cluster_number ? `CLUSTER ${school.cluster_number}` : 'Unassigned';
            
            entities.push({
                id: school.id,
                name: school.name || `School #${school.id}`,
                type: 'school',
                typeLabel: '🏫 School',
                clusterNumber: cluster,
                departmentName: null,
                displayOrder: idx,
                accountGroups: accountGroups,
                hasAccounts: hasAccounts
            });
        }
        
        for (let idx = 0; idx < allDepartments.length; idx++) {
            const dept = allDepartments[idx];
            const accounts = extractTelephoneAccounts(dept);
            
            let accountGroups = accounts;
            let hasAccounts = accounts.length > 0;
            
            if (!hasAccounts) {
                accountGroups = [{
                    accountNumber: '—',
                    numbers: [{ phoneNumber: '—', location: '', notes: '' }],
                    isPlaceholder: true
                }];
            }
            
            const displayName = dept.unit_name || dept.department_name || dept.name || `Dept #${dept.id}`;
            entities.push({
                id: dept.id,
                name: displayName,
                type: 'department',
                typeLabel: '🏛️ Department',
                clusterNumber: null,
                departmentName: dept.department_name || 'Other',
                displayOrder: allSchools.length + idx,
                accountGroups: accountGroups,
                hasAccounts: hasAccounts
            });
        }
        
        return entities;
    }

    // FIXED: More robust findExistingBill function
    function findExistingBill(entityType, entityId, accountNumber, phoneNumber, month, year) {
        // Normalize values for comparison
        const normalizedAccount = (accountNumber || '').trim();
        const normalizedPhone = (phoneNumber || '').trim();
        
        // First try exact match
        let bill = existingBills.find(bill => 
            bill.entity_type === entityType &&
            bill.entity_id == entityId &&
            (bill.account_number || '') === normalizedAccount &&
            (bill.phone_number || '') === normalizedPhone &&
            bill.month == month && 
            bill.year == year &&
            !bill.notes?.includes('isSummary')
        );
        
        // If not found, try matching by phone number only (account might be different)
        if (!bill) {
            bill = existingBills.find(bill => 
                bill.entity_type === entityType &&
                bill.entity_id == entityId &&
                (bill.phone_number || '') === normalizedPhone &&
                bill.month == month && 
                bill.year == year &&
                !bill.notes?.includes('isSummary')
            );
            if (bill) {
                console.log(`📞 Found bill by phone number only for ${normalizedPhone}`);
            }
        }
        
        // If still not found, try matching by account number only
        if (!bill && normalizedAccount && normalizedAccount !== '—') {
            bill = existingBills.find(bill => 
                bill.entity_type === entityType &&
                bill.entity_id == entityId &&
                (bill.account_number || '') === normalizedAccount &&
                bill.month == month && 
                bill.year == year &&
                !bill.notes?.includes('isSummary')
            );
            if (bill) {
                console.log(`📞 Found bill by account number only for ${normalizedAccount}`);
            }
        }
        
        return bill;
    }

    function matchesSearch(entity, searchTerm) {
        if (!searchTerm) return true;
        const term = searchTerm.toLowerCase();
        if (entity.name.toLowerCase().includes(term)) return true;
        for (const account of entity.accountGroups) {
            if (account.accountNumber && account.accountNumber !== '—' && account.accountNumber.toLowerCase().includes(term)) return true;
            if (account.numbers) {
                for (const num of account.numbers) {
                    if (num.phoneNumber && num.phoneNumber !== '—' && num.phoneNumber.toLowerCase().includes(term)) return true;
                }
            }
        }
        return false;
    }

    // FIXED SAVE FUNCTION
    async function saveEntityDataBackground(entityRow, summaryValues, month, year) {
        const startTime = performance.now();
        console.log('⏱️ START BACKGROUND SAVE');
        
        if (isLoading) return;
        
        const entityId = parseInt(entityRow.getAttribute('data-entity-id'));
        const entityType = entityRow.getAttribute('data-entity-type');
        const entityName = entityRow.getAttribute('data-entity-name');
        const hasAccounts = entityRow.getAttribute('data-has-accounts') === 'true';
        
        if (!hasAccounts) {
            showToast('❌ Cannot save: No telephone account configured for this entity.', true);
            return;
        }
        
        if (savingEntities.has(entityId)) {
            showToast('⏳ Already saving...', true);
            return;
        }
        
        showSavingToast(entityName);
        
        let summaryContainer = entityRow.nextElementSibling;
        while (summaryContainer && !summaryContainer.querySelector('.summary-container')) {
            summaryContainer = summaryContainer.nextElementSibling;
        }
        let saveBtn = null;
        if (summaryContainer) {
            saveBtn = summaryContainer.querySelector('.save-entity-btn');
        }
        const originalBtnText = saveBtn?.innerHTML || '💾 Save All';
        if (saveBtn) {
            saveBtn.innerHTML = '<span class="saving-indicator"></span> Saving...';
            saveBtn.disabled = true;
        }
        
        // Get all account rows and build Bill No. map
        let accountRows = [];
        let accountRow = entityRow.nextElementSibling;
        while (accountRow && accountRow.classList && accountRow.classList.contains('account-header-row')) {
            accountRows.push(accountRow);
            accountRow = accountRow.nextElementSibling;
            while (accountRow && accountRow.classList && accountRow.classList.contains('phone-row')) {
                accountRow = accountRow.nextElementSibling;
            }
        }
        
        const billNoMap = {};
        for (const accRow of accountRows) {
            const accNumber = accRow.getAttribute('data-account-number');
            const billNoInput = accRow.querySelector('.account-bill-number-input');
            if (accNumber && billNoInput) {
                billNoMap[accNumber] = billNoInput.value;
                console.log(`📝 Captured Bill No. for account ${accNumber}: "${billNoInput.value}"`);
            }
        }
        
        // Get all phone rows
        let phoneRows = [];
        let nextRow = entityRow.nextElementSibling;
        while (nextRow) {
            if (nextRow.classList && nextRow.classList.contains('phone-row')) {
                phoneRows.push(nextRow);
            } else if (nextRow.classList && nextRow.classList.contains('summary-row')) {
                break;
            }
            nextRow = nextRow.nextElementSibling;
        }
        
        console.log(`📞 Found ${phoneRows.length} phone rows for entity: ${entityName}`);
        
        // COLLECT ALL BILLS
        const batchBills = [];
        for (let i = 0; i < phoneRows.length; i++) {
            const row = phoneRows[i];
            const accountNumber = row.getAttribute('data-account-number') || '';
            const phoneNumber = row.getAttribute('data-phone') || '';
            const billNo = billNoMap[accountNumber] || '';
            
            let existingBillId = row.getAttribute('data-bill-id');
            if (existingBillId && existingBillId !== 'null' && existingBillId !== 'undefined' && existingBillId !== '') {
                existingBillId = parseInt(existingBillId);
            } else {
                existingBillId = null;
            }
            
            const currentInput = row.querySelector('.current-charge-input');
            const totalAmountInput = row.querySelector('.total-amount-input');
            const notesInput = row.querySelector('.notes-input');
            
            const currentCharges = parseFloat(currentInput?.value) || 0;
            const totalAmount = parseFloat(totalAmountInput?.value) || 0;
            const notes = notesInput?.value || '';
            
            console.log(`📞 Row ${i+1}: Phone=${phoneNumber}, Bill Amount=$${currentCharges}, Total Amount=$${totalAmount}, Bill No=${billNo}, Existing ID=${existingBillId}`);
            
            if (phoneNumber && phoneNumber !== '—') {
                batchBills.push({
                    id: existingBillId,
                    account_number: accountNumber === '—' ? '' : accountNumber,
                    phone_number: phoneNumber,
                    meter_number: billNo,
                    current_charges: currentCharges,
                    amount_paid: 0,
                    notes: JSON.stringify({ 
                        totalAmount: totalAmount, 
                        originalNotes: notes, 
                        billNumber: billNo 
                    }),
                    month: month,
                    year: year,
                    entity_type: entityType,
                    entity_id: entityId,
                    utility_type: 'telephone'
                });
            }
        }
        
        console.log(`📦 Sending ${batchBills.length} bills to server`);
        
        savingEntities.add(entityId);
        
        try {
            let successCount = 0;
            let errorCount = 0;
            
            if (batchBills.length > 0) {
                const resp = await fetch('/api/utility-bills/batch-update', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ bills: batchBills })
                });
                const result = await resp.json();
                successCount = result.success_count || 0;
                errorCount = result.error_count || 0;
                console.log(`📊 Server response: ${successCount} success, ${errorCount} failed`);
                
                if (successCount > 0) {
                    await loadExistingBills(month, year);
                    
                    // Update all phone rows with new data
                    for (let i = 0; i < phoneRows.length; i++) {
                        const row = phoneRows[i];
                        const phoneNumber = row.getAttribute('data-phone');
                        const accountNumber = row.getAttribute('data-account-number');
                        
                        const matchingBill = existingBills.find(bill => 
                            bill.entity_id === entityId &&
                            bill.entity_type === entityType &&
                            (bill.phone_number || '') === (phoneNumber || '') &&
                            bill.month === month &&
                            bill.year === year
                        );
                        
                        if (matchingBill && matchingBill.id) {
                            row.setAttribute('data-bill-id', matchingBill.id);
                            console.log(`✅ Updated bill ID for phone ${phoneNumber}: ${matchingBill.id}`);
                            
                            const currentInput = row.querySelector('.current-charge-input');
                            const totalAmountInput = row.querySelector('.total-amount-input');
                            if (currentInput && matchingBill.current_charges !== undefined) {
                                currentInput.value = matchingBill.current_charges.toFixed(2);
                            }
                            if (totalAmountInput && matchingBill.notes) {
                                try {
                                    const notesData = JSON.parse(matchingBill.notes);
                                    if (notesData.totalAmount !== undefined) {
                                        totalAmountInput.value = notesData.totalAmount.toFixed(2);
                                    }
                                    if (notesData.billNumber) {
                                        for (const accRow of accountRows) {
                                            const accNumber = accRow.getAttribute('data-account-number');
                                            if (accNumber === accountNumber) {
                                                const billNoInput = accRow.querySelector('.account-bill-number-input');
                                                if (billNoInput && billNoInput.value !== notesData.billNumber) {
                                                    billNoInput.value = notesData.billNumber;
                                                }
                                                break;
                                            }
                                        }
                                    }
                                } catch(e) {}
                            }
                        }
                    }
                }
            }
            
            // Save summary data
            if (summaryValues) {
                const summaryBillData = {
                    utility_type: 'telephone',
                    entity_type: entityType,
                    entity_id: entityId,
                    account_number: '',
                    phone_number: '',
                    current_charges: 0,
                    amount_paid: summaryValues.amountPaid || 0,
                    notes: JSON.stringify({
                        isSummary: true,
                        previousOutstanding: summaryValues.previousOutstanding,
                        previousPayment: summaryValues.previousPayment,
                        totalAccountCharges: summaryValues.totalAccountCharges,
                        amountPaid: summaryValues.amountPaid || 0
                    }),
                    month: month,
                    year: year
                };
                
                const existingSummary = existingBills.find(b => 
                    b.entity_type === entityType && 
                    b.entity_id === entityId && 
                    b.notes?.includes('isSummary')
                );
                
                if (existingSummary && existingSummary.id) {
                    await fetch(`/api/utility-bills/${existingSummary.id}`, {
                        method: 'PUT',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(summaryBillData)
                    });
                } else {
                    await fetch('/api/utility-bills', {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(summaryBillData)
                    });
                }
            }
            
            const endTime = performance.now();
            const totalTime = (endTime - startTime).toFixed(0);
            
            hideSavingToast();
            
            if (errorCount === 0) {
                showToast(`✅ ${entityName}: Saved ${successCount} record(s) successfully (${totalTime}ms)`);
                updateEntityTotalDisplay(entityId, summaryValues);
            } else {
                showToast(`⚠️ ${entityName}: Saved ${successCount} records, ${errorCount} failed`, true);
            }
        } catch (err) {
            console.error('❌ Save error:', err);
            hideSavingToast();
            showToast('Network error. Please try again.', true);
        } finally {
            savingEntities.delete(entityId);
            if (saveBtn) {
                saveBtn.innerHTML = originalBtnText;
                saveBtn.disabled = false;
            }
            isLoading = false;
        }
    }
    
    function updateEntityTotalDisplay(entityId, summaryValues) {
        const entityTotalSpan = document.getElementById(`entity-total-${entityId}`);
        if (entityTotalSpan && summaryValues) {
            const amountPaid = summaryValues.amountPaid || 0;
            entityTotalSpan.innerHTML = `(Total Paid: $${amountPaid.toFixed(2)})`;
        }
        
        const entityStatusSpan = document.getElementById(`entity-status-${entityId}`);
        if (entityStatusSpan) {
            const amountPaid = summaryValues?.amountPaid || 0;
            if (amountPaid > 0) {
                entityStatusSpan.innerHTML = 'Paid';
                entityStatusSpan.className = 'status-badge status-paid';
            } else {
                entityStatusSpan.innerHTML = 'Pending';
                entityStatusSpan.className = 'status-badge status-pending';
            }
        }
    }

    async function renderTelephoneTable() {
        const month = parseInt(document.getElementById('globalMonth').value);
        const year = parseInt(document.getElementById('globalYear').value);
        currentMonth = month;
        currentYear = year;
        
        const tbody = document.getElementById('billsTableBody');
        tbody.innerHTML = '<tr><td colspan="10" class="no-data">Loading data...<\/td><tr>';
        
        await loadAllEntities();
        await loadExistingBills(month, year);
        
        let allEntities = buildEntityList();
        
        const entityFilter = document.getElementById('entityTypeFilter').value;
        const searchTerm = document.getElementById('searchFilter').value;
        const statusFilter = document.getElementById('statusFilter').value;
        
        let filteredEntities = allEntities.filter(entity => {
            if (entityFilter !== 'all' && entity.type !== entityFilter) return false;
            if (searchTerm && !matchesSearch(entity, searchTerm)) return false;
            return true;
        });
        
        if (filteredEntities.length === 0) {
            tbody.innerHTML = '<tr class="no-data-row"><td colspan="10" class="no-data">No matching entities found.<\/td><\/tr>';
            restoreScrollPosition();
            isLoading = false;
            return;
        }
        
        tbody.innerHTML = '';
        let globalSerial = 1;
        
        const schoolsList = filteredEntities.filter(e => e.type === 'school');
        const departmentsList = filteredEntities.filter(e => e.type === 'department');
        
        const schoolsByCluster = new Map();
        for (const school of schoolsList) {
            const cluster = school.clusterNumber || 'Unassigned';
            if (!schoolsByCluster.has(cluster)) {
                schoolsByCluster.set(cluster, []);
            }
            schoolsByCluster.get(cluster).push(school);
        }
        
        const clusterOrder = ['CLUSTER 1', 'CLUSTER 2', 'CLUSTER 3', 'CLUSTER 4', 'CLUSTER 5', 'CLUSTER 6', 'Unassigned'];
        
        for (const cluster of clusterOrder) {
            const clusterSchools = schoolsByCluster.get(cluster);
            if (!clusterSchools || clusterSchools.length === 0) continue;
            
            let hasVisibleInCluster = false;
            const visibleClusterEntities = [];
            
            for (const entity of clusterSchools) {
                const visibleAccounts = [];
                let hasAnyVisible = false;
                
                for (const account of entity.accountGroups) {
                    const numbers = account.numbers || [];
                    const visibleNumbers = [];
                    for (const num of numbers) {
                        const phoneNum = num.phoneNumber || '—';
                        const existing = findExistingBill(entity.type, entity.id, account.accountNumber, phoneNum, month, year);
                        
                        // DEBUG: Log what we found
                        console.log(`🔍 Finding bill for ${entity.name} - Phone: ${phoneNum}, Account: ${account.accountNumber}`);
                        console.log(`   Found:`, existing ? `YES (id: ${existing.id}, charges: ${existing.current_charges})` : 'NO');
                        
                        if (statusFilter === 'all' || 
                            (statusFilter === 'paid' && existing && (existing.amount_paid || 0) > 0) ||
                            (statusFilter === 'pending' && (!existing || (existing.amount_paid || 0) === 0))) {
                            visibleNumbers.push({
                                phoneNumber: phoneNum,
                                location: num.location || '',
                                notes: num.notes || '',
                                existing: existing,
                                billId: existing?.id,
                                billNumber: existing?.meter_number || '',
                                currentCharges: existing?.current_charges || 0,
                                amountPaid: existing?.amount_paid || 0,
                                isPlaceholder: account.isPlaceholder
                            });
                        }
                    }
                    if (visibleNumbers.length > 0) {
                        hasAnyVisible = true;
                        visibleAccounts.push({
                            accountNumber: account.accountNumber,
                            numbers: visibleNumbers,
                            isPlaceholder: account.isPlaceholder
                        });
                    }
                }
                if (hasAnyVisible) {
                    hasVisibleInCluster = true;
                    visibleClusterEntities.push({...entity, accountGroups: visibleAccounts});
                }
            }
            
            if (hasVisibleInCluster && visibleClusterEntities.length > 0) {
                const totalNumbers = visibleClusterEntities.reduce((sum, e) => 
                    sum + e.accountGroups.reduce((s, a) => s + a.numbers.length, 0), 0);
                
                const separatorRow = document.createElement('tr');
                separatorRow.className = 'cluster-separator';
                separatorRow.innerHTML = `
                    <td colspan="10">
                        <div class="cluster-info">
                            <span>🏫 ${cluster}</span>
                            <span class="cluster-count">${visibleClusterEntities.length} entit${visibleClusterEntities.length > 1 ? 'ies' : 'y'}, ${totalNumbers} phone number${totalNumbers > 1 ? 's' : ''}</span>
                        </div>
                     </div>
                `;
                tbody.appendChild(separatorRow);
                
                for (const entity of visibleClusterEntities) {
                    globalSerial = await renderEntity(tbody, entity, month, year, globalSerial);
                }
            }
        }
        
        const deptByDepartmentName = new Map();
        for (const dept of departmentsList) {
            const deptName = dept.departmentName || 'Other';
            if (!deptByDepartmentName.has(deptName)) {
                deptByDepartmentName.set(deptName, []);
            }
            deptByDepartmentName.get(deptName).push(dept);
        }
        
        const deptNamesInOrder = [];
        for (const dept of departmentsList) {
            const deptName = dept.departmentName || 'Other';
            if (!deptNamesInOrder.includes(deptName)) {
                deptNamesInOrder.push(deptName);
            }
        }
        
        for (const deptName of deptNamesInOrder) {
            const deptsInGroup = deptByDepartmentName.get(deptName);
            if (!deptsInGroup || deptsInGroup.length === 0) continue;
            
            let hasVisibleInGroup = false;
            const visibleGroupEntities = [];
            
            for (const entity of deptsInGroup) {
                const visibleAccounts = [];
                let hasAnyVisible = false;
                
                for (const account of entity.accountGroups) {
                    const numbers = account.numbers || [];
                    const visibleNumbers = [];
                    for (const num of numbers) {
                        const phoneNum = num.phoneNumber || '—';
                        const existing = findExistingBill(entity.type, entity.id, account.accountNumber, phoneNum, month, year);
                        
                        if (statusFilter === 'all' || 
                            (statusFilter === 'paid' && existing && (existing.amount_paid || 0) > 0) ||
                            (statusFilter === 'pending' && (!existing || (existing.amount_paid || 0) === 0))) {
                            visibleNumbers.push({
                                phoneNumber: phoneNum,
                                location: num.location || '',
                                notes: num.notes || '',
                                existing: existing,
                                billId: existing?.id,
                                billNumber: existing?.meter_number || '',
                                currentCharges: existing?.current_charges || 0,
                                amountPaid: existing?.amount_paid || 0,
                                isPlaceholder: account.isPlaceholder
                            });
                        }
                    }
                    if (visibleNumbers.length > 0) {
                        hasAnyVisible = true;
                        visibleAccounts.push({
                            accountNumber: account.accountNumber,
                            numbers: visibleNumbers,
                            isPlaceholder: account.isPlaceholder
                        });
                    }
                }
                if (hasAnyVisible) {
                    hasVisibleInGroup = true;
                    visibleGroupEntities.push({...entity, accountGroups: visibleAccounts});
                }
            }
            
            if (hasVisibleInGroup && visibleGroupEntities.length > 0) {
                const totalNumbers = visibleGroupEntities.reduce((sum, e) => 
                    sum + e.accountGroups.reduce((s, a) => s + a.numbers.length, 0), 0);
                
                const deptSeparator = document.createElement('tr');
                deptSeparator.className = 'department-group-separator';
                deptSeparator.innerHTML = `
                    <td colspan="10">
                        <div class="dept-group-info">
                            <span class="department-name-badge">🏢 ${escapeHtml(deptName)}</span>
                            <span class="dept-group-count">${visibleGroupEntities.length} unit${visibleGroupEntities.length > 1 ? 's' : ''}, ${totalNumbers} phone number${totalNumbers > 1 ? 's' : ''}</span>
                        </div>
                     </div>
                `;
                tbody.appendChild(deptSeparator);
                
                for (const entity of visibleGroupEntities) {
                    globalSerial = await renderEntity(tbody, entity, month, year, globalSerial);
                }
            }
        }
        
        restoreScrollPosition();
        isLoading = false;
        showLoading(false);
    }
    
    // FIXED renderEntity
    async function renderEntity(tbody, entity, month, year, startSerial) {
        let serial = startSerial;
        let entityTotalPaid = 0;
        let entityHasBills = false;
        let isPlaceholder = false;
        
        const summaryKey = `${entity.type}_${entity.id}`;
        const existingSummary = existingSummaryData[summaryKey] || {};
        
        const entityRow = document.createElement('tr');
        entityRow.className = 'entity-row';
        entityRow.setAttribute('data-entity-type', entity.type);
        entityRow.setAttribute('data-entity-id', entity.id);
        entityRow.setAttribute('data-entity-name', entity.name);
        entityRow.setAttribute('data-has-accounts', !isPlaceholder);
        
        entityRow.innerHTML = `
            <td class="seq-number">${startSerial}</td>
            <td class="entity-header">
                <span class="entity-name">${escapeHtml(entity.name)}</span>
                <span class="total-due" id="entity-total-${entity.id}">(Total Paid: $${(existingSummary.amountPaid || 0).toFixed(2)})</span>
             </div>
            <td><span class="badge ${entity.type === 'school' ? 'badge-school' : 'badge-department'}">${entity.typeLabel}</span></div>
            <td colspan="3"></div>
            <td></div>
            <td></div>
            <td><span class="status-badge ${(existingSummary.amountPaid || 0) > 0 ? 'status-paid' : 'status-pending'}" id="entity-status-${entity.id}">${(existingSummary.amountPaid || 0) > 0 ? 'Paid' : 'Pending'}</span></div>
            <td class="entity-actions">
            </div>
        `;
        tbody.appendChild(entityRow);
        
        for (const account of entity.accountGroups) {
            if (account.isPlaceholder) continue;
            
            let accountBillNumber = '';
            
            // Find Bill No. from ANY phone number in this account
            for (const num of account.numbers) {
                const existing = num.existing;
                if (existing && existing.meter_number && existing.meter_number !== '') {
                    accountBillNumber = existing.meter_number;
                    break;
                }
                if (existing && existing.notes) {
                    try {
                        const parsed = JSON.parse(existing.notes);
                        if (parsed.billNumber && parsed.billNumber !== '') {
                            accountBillNumber = parsed.billNumber;
                            break;
                        }
                    } catch(e) {}
                }
            }
            
            const accountRow = document.createElement('tr');
            accountRow.className = 'account-header-row';
            accountRow.setAttribute('data-entity-type', entity.type);
            accountRow.setAttribute('data-entity-id', entity.id);
            accountRow.setAttribute('data-account-number', account.accountNumber);
            
            accountRow.innerHTML = `
                <td></div>
                <td colspan="2">
                    <span class="account-number">📁 ${escapeHtml(account.accountNumber)}</span>
                 </div>
                <td class="bill-number-cell"><input type="text" class="bill-number-input account-bill-number-input" value="${escapeHtml(accountBillNumber)}" placeholder="Enter Bill No."></div>
                <td colspan="2"></div>
                <td></div>
                <td></div>
                <td colspan="2"></div>
            `;
            tbody.appendChild(accountRow);
            
            for (const num of account.numbers) {
                const existing = num.existing;
                
                // Debug log for first phone number
                console.log(`📞 RENDERING - Entity: ${entity.name}, Phone: ${num.phoneNumber}, Existing:`, existing ? `YES (charges: ${existing.current_charges})` : 'NO');
                
                let currentCharges = existing ? (existing.current_charges || 0) : 0;
                let totalAmount = 0;
                let amountPaid = existing ? (existing.amount_paid || 0) : 0;
                let notes = num.notes || '';
                
                if (existing && existing.notes && existing.notes.startsWith('{')) {
                    try {
                        const parsed = JSON.parse(existing.notes);
                        totalAmount = parsed.totalAmount || 0;
                        amountPaid = parsed.amountPaid || existing.amount_paid || 0;
                        notes = parsed.originalNotes || num.notes || '';
                    } catch(e) {}
                }
                
                if (!account.isPlaceholder) {
                    entityTotalPaid += amountPaid;
                    if (amountPaid > 0) {
                        entityHasBills = true;
                    }
                }
                
                const locationDisplay = num.location ? `<div style="font-size:0.7rem; color:#666;">📍 ${escapeHtml(num.location)}</div>` : '';
                
                const phoneRow = document.createElement('tr');
                phoneRow.className = 'phone-row';
                phoneRow.setAttribute('data-account-number', account.accountNumber);
                phoneRow.setAttribute('data-phone', escapeHtml(num.phoneNumber));
                if (existing && existing.id) {
                    phoneRow.setAttribute('data-bill-id', existing.id);
                    console.log(`🔑 Set data-bill-id for phone ${num.phoneNumber}: ${existing.id}`);
                } else {
                    phoneRow.setAttribute('data-bill-id', '');
                }
                
                phoneRow.innerHTML = `
                    <td class="seq-number">${serial}</div>
                    <td></div>
                    <td></div>
                    <td></div>
                    <td><div class="phone-number">📞 ${escapeHtml(num.phoneNumber)}</div>${locationDisplay}</div>
                    <td><input type="number" step="0.01" class="inline-input current-charge-input" value="${currentCharges.toFixed(2)}" placeholder="$"></div>
                    <td><input type="number" step="0.01" class="inline-input total-amount-input" value="${totalAmount.toFixed(2)}" placeholder="$"></div>
                    <td><input type="text" class="inline-input notes-input" value="${escapeHtml(notes)}" placeholder="Notes..."></div>
                    <td></div>
                    <td></div>
                `;
                tbody.appendChild(phoneRow);
                serial++;
            }
        }
        
        const entityStatusSpan = document.getElementById(`entity-status-${entity.id}`);
        if (entityStatusSpan) {
            const entityStatusText = (existingSummary.amountPaid || 0) > 0 ? 'Paid' : 'Pending';
            const entityStatusClass = (existingSummary.amountPaid || 0) > 0 ? 'status-paid' : 'status-pending';
            entityStatusSpan.innerHTML = entityStatusText;
            entityStatusSpan.className = `status-badge ${entityStatusClass}`;
        }
        
        const previousOutstanding = existingSummary.previousOutstanding || 0;
        const previousPayment = existingSummary.previousPayment || 0;
        const totalAccountCharges = existingSummary.totalAccountCharges || 0;
        const amountPaid = existingSummary.amountPaid || 0;
        
        const totalCurrentCharges = previousOutstanding + (-previousPayment) + totalAccountCharges;
        
        const summaryRow = document.createElement('tr');
        summaryRow.className = 'summary-row';
        
        const summaryCell = document.createElement('td');
        summaryCell.colSpan = 10;
        summaryCell.style.padding = '15px 20px';
        summaryCell.style.backgroundColor = 'transparent';
        
        summaryCell.innerHTML = `
            <div class="summary-container">
                <div class="summary-title-box">💰 BILL SUMMARY - ${escapeHtml(entity.name)}</div>
                <div class="summary-grid">
                    <div class="summary-item">
                        <span class="summary-label">Previous Outstanding ($)</span>
                        <input type="number" step="0.01" class="summary-input summary-previous-outstanding" id="prev_out_${entity.id}" value="${previousOutstanding.toFixed(2)}" placeholder="0.00">
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Previous Payment ($)</span>
                        <input type="number" step="0.01" class="summary-input summary-previous-payment" id="prev_pay_${entity.id}" value="${previousPayment.toFixed(2)}" placeholder="0.00">
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Total Account Charges ($)</span>
                        <input type="number" step="0.01" class="summary-input summary-total-account-charges" id="total_acc_${entity.id}" value="${totalAccountCharges.toFixed(2)}" placeholder="0.00">
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Total Current Charges ($)</span>
                        <div class="summary-value" id="total_current_charges_${entity.id}">${totalCurrentCharges.toFixed(2)}</div>
                    </div>
                    <div class="summary-item">
                        <span class="summary-label">Amount Paid ($)</span>
                        <input type="number" step="0.01" class="summary-input summary-amount-paid" id="amount_paid_${entity.id}" value="${amountPaid.toFixed(2)}" placeholder="0.00">
                    </div>
                </div>
                <div class="summary-actions">
                    <button class="btn btn-success save-entity-btn">💾 Save All</button>
                </div>
            </div>
        `;
        
        summaryRow.appendChild(summaryCell);
        tbody.appendChild(summaryRow);
        
        const prevOutInput = summaryCell.querySelector('.summary-previous-outstanding');
        const prevPayInput = summaryCell.querySelector('.summary-previous-payment');
        const totalAccInput = summaryCell.querySelector('.summary-total-account-charges');
        const currentChargesDiv = summaryCell.querySelector('#total_current_charges_' + entity.id);
        
        const updateCurrentCharges = () => {
            const prevOut = parseFloat(prevOutInput?.value) || 0;
            const prevPay = parseFloat(prevPayInput?.value) || 0;
            const totalAcc = parseFloat(totalAccInput?.value) || 0;
            const totalCurrent = prevOut + (-prevPay) + totalAcc;
            if (currentChargesDiv) {
                currentChargesDiv.innerText = totalCurrent.toFixed(2);
            }
        };
        
        if (prevOutInput) prevOutInput.addEventListener('input', updateCurrentCharges);
        if (prevPayInput) prevPayInput.addEventListener('input', updateCurrentCharges);
        if (totalAccInput) totalAccInput.addEventListener('input', updateCurrentCharges);
        
        const saveBtn = summaryCell.querySelector('.save-entity-btn');
        if (saveBtn) {
            saveBtn.onclick = async () => {
                const summaryValues = {
                    previousOutstanding: parseFloat(prevOutInput?.value) || 0,
                    previousPayment: parseFloat(prevPayInput?.value) || 0,
                    totalAccountCharges: parseFloat(totalAccInput?.value) || 0,
                    amountPaid: parseFloat(summaryCell.querySelector('.summary-amount-paid')?.value) || 0
                };
                await saveEntityDataBackground(entityRow, summaryValues, month, year);
            };
        }
        
        return serial;
    }
    
    function escapeHtml(str) {
        if (!str) return '';
        return String(str).replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        });
    }
    
    function attachEventListeners() {
        document.getElementById('billsTableBody').addEventListener('click', async (e) => {
            const saveBtn = e.target.closest('.save-entity-btn');
            if (saveBtn && !saveBtn.disabled) {
                let entityRow = saveBtn.closest('tr.entity-row');
                if (!entityRow) {
                    const summaryRow = saveBtn.closest('.summary-row');
                    if (summaryRow) {
                        let prev = summaryRow.previousElementSibling;
                        while (prev && !prev.classList.contains('entity-row')) {
                            prev = prev.previousElementSibling;
                        }
                        entityRow = prev;
                    }
                }
                if (entityRow && entityRow.classList.contains('entity-row')) {
                    const entityId = entityRow.getAttribute('data-entity-id');
                    const prevOutInput = document.querySelector(`#prev_out_${entityId}`);
                    const prevPayInput = document.querySelector(`#prev_pay_${entityId}`);
                    const totalAccInput = document.querySelector(`#total_acc_${entityId}`);
                    const amountPaidInput = document.querySelector(`#amount_paid_${entityId}`);
                    
                    const summaryValues = {
                        previousOutstanding: parseFloat(prevOutInput?.value) || 0,
                        previousPayment: parseFloat(prevPayInput?.value) || 0,
                        totalAccountCharges: parseFloat(totalAccInput?.value) || 0,
                        amountPaid: parseFloat(amountPaidInput?.value) || 0
                    };
                    await saveEntityDataBackground(entityRow, summaryValues, currentMonth, currentYear);
                }
                return;
            }
        });
    }
    
    document.addEventListener('DOMContentLoaded', async () => {
        populateYears();
        
        const now = new Date();
        const monthSelect = document.getElementById('globalMonth');
        const yearSelect = document.getElementById('globalYear');
        
        if (monthSelect) monthSelect.value = now.getMonth() + 1;
        if (yearSelect) yearSelect.value = now.getFullYear();
        
        attachEventListeners();
        await renderTelephoneTable();
        
        const refreshBtn = document.getElementById('refreshTableBtn');
        if (refreshBtn) {
            refreshBtn.addEventListener('click', async () => {
                await renderTelephoneTable();
            });
        }
        
        const applyFiltersBtn = document.getElementById('applyFiltersBtn');
        if (applyFiltersBtn) {
            applyFiltersBtn.addEventListener('click', async () => {
                await renderTelephoneTable();
            });
        }
    });
</script>
