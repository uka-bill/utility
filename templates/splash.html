<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ministry of Education Brunei - Utility Bills Management</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(145deg, #1a56db 0%, #1e3a5f 50%, #0f172a 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            padding: 20px;
            position: relative;
        }
        
        body::before {
            content: '';
            position: absolute;
            top: -50%;
            right: -30%;
            width: 800px;
            height: 800px;
            background: radial-gradient(circle, rgba(59, 130, 246, 0.10) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        
        body::after {
            content: '';
            position: absolute;
            bottom: -40%;
            left: -20%;
            width: 600px;
            height: 600px;
            background: radial-gradient(circle, rgba(124, 58, 237, 0.08) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        
        .splash-container {
            text-align: center;
            color: white;
            background: rgba(255, 255, 255, 0.06);
            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);
            padding: 56px 48px 48px;
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35), inset 0 1px 0 rgba(255, 255, 255, 0.10);
            max-width: 540px;
            width: 100%;
            animation: fadeIn 1.2s cubic-bezier(0.25, 0.46, 0.45, 0.94) forwards;
            border: 1px solid rgba(255, 255, 255, 0.08);
            position: relative;
            z-index: 1;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }
        
        .logo-icon {
            font-size: 3.8rem;
            margin-bottom: 16px;
            display: inline-block;
            background: rgba(255, 255, 255, 0.10);
            width: 90px;
            height: 90px;
            line-height: 90px;
            border-radius: 50%;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        .title {
            font-size: 1.8rem;
            font-weight: 700;
            letter-spacing: -0.5px;
            margin-bottom: 6px;
            background: linear-gradient(135deg, #ffffff 0%, #93bbfc 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .subtitle {
            font-size: 1rem;
            font-weight: 400;
            opacity: 0.75;
            margin-bottom: 32px;
            letter-spacing: 0.3px;
        }
        
        .subtitle .highlight {
            opacity: 1;
            font-weight: 500;
            color: #93bbfc;
            -webkit-text-fill-color: #93bbfc;
        }
        
        .loading-container {
            margin: 24px auto 28px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }
        
        .loading-bar {
            width: 100%;
            max-width: 280px;
            height: 4px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 4px;
            overflow: hidden;
        }
        
        .loading-progress {
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, #3b82f6, #93bbfc);
            animation: loading 2.5s ease-in-out forwards;
            transform-origin: left;
            border-radius: 4px;
        }
        
        @keyframes loading {
            0% { transform: scaleX(0); }
            70% { transform: scaleX(0.85); }
            100% { transform: scaleX(1); }
        }
        
        .loading-text {
            font-size: 0.8rem;
            opacity: 0.5;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        
        .enter-btn {
            padding: 14px 48px;
            background: linear-gradient(145deg, #3b82f6 0%, #1a56db 100%);
            color: white;
            border: none;
            border-radius: 50px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            box-shadow: 0 8px 32px rgba(26, 86, 219, 0.40);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
            position: relative;
            overflow: hidden;
            opacity: 0;
            animation: showButton 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94) 2.2s forwards;
        }
        
        .enter-btn::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.15), transparent);
            transition: left 0.6s ease;
        }
        
        .enter-btn:hover {
            transform: translateY(-3px) scale(1.02);
            box-shadow: 0 12px 48px rgba(26, 86, 219, 0.55);
        }
        
        .enter-btn:hover::before {
            left: 100%;
        }
        
        .enter-btn:active {
            transform: translateY(0) scale(0.98);
        }
        
        @keyframes showButton {
            to { opacity: 1; }
        }
        
        .version-info {
            margin-top: 24px;
            font-size: 0.7rem;
            opacity: 0.3;
            letter-spacing: 0.5px;
        }
        
        .decorative-dots {
            display: flex;
            gap: 6px;
            justify-content: center;
            margin-top: 8px;
        }
        
        .decorative-dots span {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.15);
        }
        
        .decorative-dots span:nth-child(1) { animation: pulse 2s ease-in-out infinite 0s; }
        .decorative-dots span:nth-child(2) { animation: pulse 2s ease-in-out infinite 0.3s; }
        .decorative-dots span:nth-child(3) { animation: pulse 2s ease-in-out infinite 0.6s; }
        
        @keyframes pulse {
            0%, 100% { opacity: 0.15; transform: scale(1); }
            50% { opacity: 0.6; transform: scale(1.3); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .splash-container {
                padding: 40px 28px 32px;
                margin: 0 16px;
            }
            
            .title {
                font-size: 1.5rem;
            }
            
            .subtitle {
                font-size: 0.9rem;
            }
            
            .logo-icon {
                font-size: 3rem;
                width: 74px;
                height: 74px;
                line-height: 74px;
            }
            
            .enter-btn {
                padding: 12px 36px;
                font-size: 0.9rem;
            }
        }
        
        @media (max-width: 480px) {
            .splash-container {
                padding: 32px 20px 24px;
            }
            
            .title {
                font-size: 1.3rem;
            }
            
            .subtitle {
                font-size: 0.8rem;
            }
            
            .logo-icon {
                font-size: 2.4rem;
                width: 64px;
                height: 64px;
                line-height: 64px;
            }
            
            .enter-btn {
                padding: 10px 28px;
                font-size: 0.85rem;
                width: 100%;
            }
            
            .loading-bar {
                max-width: 100%;
            }
        }
    </style>
</head>
<body>
    <div class="splash-container">
        <div class="logo-icon">🇧🇳</div>
        <h1 class="title">Ministry of Education Brunei</h1>
        <p class="subtitle">Utility Bills <span class="highlight">Management System</span></p>
        
        <div class="loading-container">
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
            <div class="loading-text">Ready to proceed</div>
            <div class="decorative-dots">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
        
        <button class="enter-btn" onclick="enterSystem()">Enter System →</button>
        
        <div class="version-info">v2.0 • Protected by Supabase</div>
    </div>

    <script>
        function enterSystem() {
            window.location.href = '/dashboard';
        }
        
        // Enter key support
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Enter' || e.key === ' ') {
                e.preventDefault();
                enterSystem();
            }
        });
    </script>
</body>
</html>
